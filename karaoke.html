<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KARA - TOTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06040f;--neon-pink:#ff2d9b;--neon-blue:#00d4ff;--neon-purple:#b44fff;
  --neon-yellow:#ffe600;--surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--text:#f5f0ff;--muted:rgba(255,255,255,0.35);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background:
  radial-gradient(ellipse 80% 40% at 20% 0%,rgba(180,79,255,0.18) 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 80% 10%,rgba(0,212,255,0.12) 0%,transparent 60%),
  radial-gradient(ellipse 50% 60% at 50% 100%,rgba(255,45,155,0.10) 0%,transparent 60%);
  pointer-events:none;}
body::after{content:'';position:fixed;inset:0;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
  pointer-events:none;}
.app{position:relative;z-index:1;padding-bottom:50px;}

/* Header */
header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:baseline;gap:3px;}
.logo-kara{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#fff;letter-spacing:2px;
  text-shadow:0 0 10px rgba(255,45,155,0.8),0 0 30px rgba(255,45,155,0.4);animation:flicker 4s infinite;}
.logo-dash{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--neon-blue);
  text-shadow:0 0 10px rgba(0,212,255,0.8);margin:0 4px;}
.logo-totem{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--neon-blue);letter-spacing:2px;
  text-shadow:0 0 10px rgba(0,212,255,0.8),0 0 30px rgba(0,212,255,0.4);}
@keyframes flicker{0%,93%,96%,100%{opacity:1}94%,95%{opacity:.7}}
.live-pill{display:flex;align-items:center;gap:6px;border:1px solid rgba(255,45,155,0.4);border-radius:20px;
  padding:6px 14px;font-size:.68rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  color:var(--neon-pink);background:rgba(255,45,155,0.08);}
.live-dot{width:7px;height:7px;background:var(--neon-pink);border-radius:50%;
  box-shadow:0 0 6px var(--neon-pink);animation:livePulse 1.2s infinite;}
@keyframes livePulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.5);opacity:.4}}

/* Now playing */
#now-playing-bar{margin:18px 20px 0;background:linear-gradient(135deg,rgba(180,79,255,0.12),rgba(0,212,255,0.08));
  border:1px solid rgba(180,79,255,0.3);border-radius:16px;padding:14px 18px;
  display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;}
#now-playing-bar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--neon-pink),var(--neon-purple),var(--neon-blue));}
.np-mic{font-size:1.4rem;filter:drop-shadow(0 0 6px rgba(255,45,155,0.6));}
.np-info{flex:1;overflow:hidden;}
.np-label{font-size:.72rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--neon-purple);margin-bottom:3px;font-weight:600;}
.np-title{font-size:1.05rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;}
.np-bars{display:flex;align-items:flex-end;gap:3px;height:18px;}
.np-bar{width:3px;border-radius:3px;animation:npBar .6s infinite alternate;}
.np-bar:nth-child(1){background:var(--neon-pink);height:6px;animation-delay:0s}
.np-bar:nth-child(2){background:var(--neon-purple);height:10px;animation-delay:.1s}
.np-bar:nth-child(3){background:var(--neon-blue);height:14px;animation-delay:.2s}
.np-bar:nth-child(4){background:var(--neon-purple);height:8px;animation-delay:.3s}
.np-bar:nth-child(5){background:var(--neon-pink);height:12px;animation-delay:.15s}
@keyframes npBar{from{transform:scaleY(.3)}to{transform:scaleY(1)}}

/* Section */
.section{padding:20px 20px 0;}
.section-label{font-size:.78rem;letter-spacing:3px;text-transform:uppercase;font-weight:600;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.12),transparent);}
.label-pink{color:var(--neon-pink);text-shadow:0 0 8px rgba(255,45,155,0.5);}
.label-yellow{color:var(--neon-yellow);text-shadow:0 0 8px rgba(255,230,0,0.5);}
.label-blue{color:var(--neon-blue);text-shadow:0 0 8px rgba(0,212,255,0.5);}

/* ── REQUEST CARD (tema + nombre juntos) ── */
.request-card{background:rgba(180,79,255,0.06);border:1px solid rgba(180,79,255,0.2);border-radius:18px;padding:16px;}

/* Search inside card */
.card-search-wrap{display:flex;gap:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(180,79,255,0.2);
  border-radius:12px;padding:4px 4px 4px 14px;margin-bottom:10px;transition:border-color .2s,box-shadow .2s;}
.card-search-wrap:focus-within{border-color:rgba(180,79,255,0.5);box-shadow:0 0 0 3px rgba(180,79,255,0.08);}
.card-search-wrap input{flex:1;background:transparent;border:none;outline:none;color:var(--text);
  font-family:'Outfit',sans-serif;font-size:1rem;padding:10px 0;}
.card-search-wrap input::placeholder{color:var(--muted);}
.card-search-btn{background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));border:none;
  border-radius:9px;color:#fff;font-family:'Outfit',sans-serif;font-weight:600;font-size:.88rem;
  padding:9px 16px;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
.card-search-btn:active{opacity:.8;}

/* Selected song display */
#selected-song-box{display:none;background:rgba(255,45,155,0.08);border:1px solid rgba(255,45,155,0.25);
  border-radius:11px;padding:11px 14px;margin-bottom:10px;display:none;
  align-items:center;gap:10px;}
.selected-thumb{width:48px;height:34px;object-fit:cover;border-radius:6px;flex-shrink:0;}
.selected-info{flex:1;overflow:hidden;}
.selected-title{font-size:.96rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.selected-ch{font-size:.8rem;color:var(--muted);}
.selected-clear{background:transparent;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:4px;}

/* Name input inside card */
.card-name-wrap{position:relative;margin-bottom:10px;}
.card-name-wrap input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(0,212,255,0.2);
  border-radius:12px;padding:13px 16px;color:var(--text);font-family:'Outfit',sans-serif;font-size:1rem;
  outline:none;transition:border-color .2s,box-shadow .2s;}
.card-name-wrap input:focus{border-color:rgba(0,212,255,0.5);box-shadow:0 0 0 3px rgba(0,212,255,0.08);}
.card-name-wrap input::placeholder{color:var(--muted);}
.card-hint{font-size:.82rem;color:var(--muted);margin-bottom:12px;padding-left:2px;}

.send-request-btn{width:100%;background:linear-gradient(135deg,var(--neon-pink),var(--neon-purple));
  border:none;border-radius:12px;padding:16px;color:#fff;font-weight:700;font-size:1.05rem;
  cursor:pointer;font-family:'Outfit',sans-serif;letter-spacing:.5px;
  box-shadow:0 4px 24px rgba(255,45,155,0.3);transition:opacity .15s,transform .15s;}
.send-request-btn:active{opacity:.85;transform:scale(.98);}
.send-request-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* Results dropdown */
#results{background:rgba(10,6,20,0.98);border:1px solid rgba(180,79,255,0.2);
  border-radius:12px;overflow:hidden;display:none;margin-bottom:8px;backdrop-filter:blur(20px);}
.result-item{display:flex;align-items:center;gap:12px;padding:11px 14px;
  border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background .15s;}
.result-item:last-child{border-bottom:none;}
.result-item:active{background:rgba(180,79,255,0.12);}
.result-thumb{width:50px;height:36px;object-fit:cover;border-radius:7px;flex-shrink:0;}
.result-info{flex:1;overflow:hidden;}
.result-title{font-size:.96rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.result-channel{font-size:.8rem;color:var(--muted);}
.result-pick{background:linear-gradient(135deg,rgba(255,45,155,0.2),rgba(180,79,255,0.2));
  border:1px solid rgba(255,45,155,0.4);border-radius:8px;color:var(--neon-pink);
  font-size:.75rem;font-weight:600;padding:6px 12px;cursor:pointer;font-family:'Outfit',sans-serif;
  white-space:nowrap;transition:all .15s;}
.result-pick:active{background:rgba(255,45,155,0.35);}
.search-hint{padding:16px;text-align:center;color:var(--muted);font-size:.95rem;}

/* Top list */
#top-list{display:flex;flex-direction:column;gap:7px;}
.top-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:13px;
  cursor:pointer;border:1px solid transparent;transition:all .2s;position:relative;overflow:hidden;}
.top-item::before{content:'';position:absolute;inset:0;background:var(--surface2);z-index:0;border-radius:12px;}
.top-item:nth-child(1)::before{background:linear-gradient(135deg,rgba(255,230,0,0.08),rgba(255,45,155,0.06));}
.top-item:nth-child(2)::before{background:linear-gradient(135deg,rgba(180,79,255,0.08),rgba(0,212,255,0.05));}
.top-item:nth-child(3)::before{background:linear-gradient(135deg,rgba(0,212,255,0.07),rgba(180,79,255,0.05));}
.top-item:nth-child(1){border-color:rgba(255,230,0,0.2);}
.top-item:nth-child(2){border-color:rgba(180,79,255,0.15);}
.top-item:nth-child(3){border-color:rgba(0,212,255,0.12);}
/* Colors for items 4+ via JS classes */
.top-c0::before{background:linear-gradient(135deg,rgba(255,230,0,0.07),rgba(255,45,155,0.05))!important;}
.top-c0{border-color:rgba(255,230,0,0.15)!important;}
.top-c1::before{background:linear-gradient(135deg,rgba(180,79,255,0.07),rgba(0,212,255,0.04))!important;}
.top-c1{border-color:rgba(180,79,255,0.12)!important;}
.top-c2::before{background:linear-gradient(135deg,rgba(0,212,255,0.06),rgba(180,79,255,0.04))!important;}
.top-c2{border-color:rgba(0,212,255,0.1)!important;}
.top-c3::before{background:linear-gradient(135deg,rgba(255,45,155,0.06),rgba(180,79,255,0.04))!important;}
.top-c3{border-color:rgba(255,45,155,0.12)!important;}
.top-item:active{transform:scale(.98);}
.top-rank{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;min-width:28px;text-align:center;position:relative;z-index:1;}
.top-item:nth-child(1) .top-rank{color:var(--neon-yellow);text-shadow:0 0 10px rgba(255,230,0,0.7);}
.top-item:nth-child(2) .top-rank{color:#c0c0c0;text-shadow:0 0 8px rgba(192,192,192,0.5);}
.top-item:nth-child(3) .top-rank{color:#cd7f32;text-shadow:0 0 8px rgba(205,127,50,0.5);}
.top-rank-other{font-size:1.2rem;}
.top-c0 .top-rank-other{color:var(--neon-yellow);text-shadow:0 0 8px rgba(255,230,0,0.5);}
.top-c1 .top-rank-other{color:var(--neon-purple);text-shadow:0 0 8px rgba(180,79,255,0.5);}
.top-c2 .top-rank-other{color:var(--neon-blue);text-shadow:0 0 8px rgba(0,212,255,0.5);}
.top-c3 .top-rank-other{color:var(--neon-pink);text-shadow:0 0 8px rgba(255,45,155,0.5);}
.top-info{flex:1;overflow:hidden;position:relative;z-index:1;}
.top-title{font-size:1rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-count{font-size:.8rem;color:var(--muted);margin-top:2px;}
.top-add{position:relative;z-index:1;background:transparent;border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;color:var(--muted);font-size:.82rem;padding:6px 12px;cursor:pointer;
  font-family:'Outfit',sans-serif;flex-shrink:0;}
.top-item:nth-child(1) .top-add{border-color:rgba(255,230,0,0.3);color:var(--neon-yellow);}
.top-item:nth-child(2) .top-add{border-color:rgba(180,79,255,0.3);color:var(--neon-purple);}
.top-item:nth-child(3) .top-add{border-color:rgba(0,212,255,0.3);color:var(--neon-blue);}
.top-c0 .top-add{border-color:rgba(255,230,0,0.3)!important;color:var(--neon-yellow)!important;}
.top-c1 .top-add{border-color:rgba(180,79,255,0.3)!important;color:var(--neon-purple)!important;}
.top-c2 .top-add{border-color:rgba(0,212,255,0.3)!important;color:var(--neon-blue)!important;}
.top-c3 .top-add{border-color:rgba(255,45,155,0.3)!important;color:var(--neon-pink)!important;}
.top-empty{text-align:center;color:var(--muted);padding:24px;font-size:.95rem;}

/* Messages */


.msg-input:focus{border-color:rgba(0,212,255,0.5);box-shadow:0 0 0 3px rgba(0,212,255,0.08);}
.msg-input::placeholder{color:var(--muted);}

.msg-send:active{opacity:.8;transform:scale(.95);}


.msg-bubble{font-size:.85rem;line-height:1.4;flex:1;}
.msg-time{font-size:.68rem;color:var(--muted);white-space:nowrap;padding-top:2px;}


/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(10,6,20,0.95);border:1px solid rgba(180,79,255,0.4);border-radius:30px;
  padding:12px 24px;font-size:.85rem;font-weight:600;color:var(--neon-purple);
  box-shadow:0 0 20px rgba(180,79,255,0.2);backdrop-filter:blur(20px);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── Carousel ── */
.carousel-wrap{overflow:hidden;position:relative;}
.carousel-track{display:flex;gap:12px;overflow-x:auto;padding:4px 20px 16px;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.carousel-track::-webkit-scrollbar{display:none;}
.car-card{flex-shrink:0;width:148px;height:120px;border-radius:16px;overflow:hidden;
  scroll-snap-align:start;cursor:pointer;position:relative;transition:transform .18s;
  display:flex;flex-direction:column;justify-content:flex-end;}
.car-card:active{transform:scale(.95);}
/* 6 gradient backgrounds */
.car-g0{background:linear-gradient(145deg,#6d00cc 0%,#0d1a4d 100%);}
.car-g1{background:linear-gradient(145deg,#cc0055 0%,#1a0033 100%);}
.car-g2{background:linear-gradient(145deg,#0066cc 0%,#1a0044 100%);}
.car-g3{background:linear-gradient(145deg,#cc6600 0%,#1a0044 100%);}
.car-g4{background:linear-gradient(145deg,#00aacc 0%,#001a33 100%);}
.car-g5{background:linear-gradient(145deg,#aa00cc 0%,#003322 100%);}
/* Noise texture overlay for depth */
.car-card::before{content:'';position:absolute;inset:0;z-index:0;
  background:radial-gradient(ellipse at 30% 20%,rgba(255,255,255,0.12) 0%,transparent 60%);}
.car-emoji{position:absolute;top:10px;left:12px;font-size:2rem;z-index:2;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,0.6));}
.car-pick-btn{position:absolute;top:8px;right:8px;z-index:3;
  background:rgba(255,45,155,0.92);border:none;border-radius:7px;
  color:#fff;font-size:.72rem;font-weight:700;padding:4px 9px;cursor:pointer;
  box-shadow:0 2px 10px rgba(255,45,155,0.5);letter-spacing:.3px;font-family:'Outfit',sans-serif;}
.car-info{position:relative;z-index:2;padding:0 10px 10px;
  background:linear-gradient(transparent,rgba(0,0,0,0.5));}
.car-title{font-size:.85rem;font-weight:700;line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,0.8);}
.car-artist{font-size:.70rem;color:rgba(255,255,255,0.7);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-shadow:0 1px 3px rgba(0,0,0,0.7);}

</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <span class="logo-kara">KARA</span>
      <span class="logo-dash">—</span>
      <span class="logo-totem">TOTEM</span>
    </div>
    <div class="live-pill"><div class="live-dot"></div>EN VIVO</div>
  </header>

  <div id="now-playing-bar">
    <div class="np-mic">🎤</div>
    <div class="np-info">
      <div class="np-label">Sonando ahora</div>
      <div class="np-title" id="np-title">Esperando canción...</div>
    </div>
    <div class="np-bars" id="np-bars" style="display:none">
      <div class="np-bar"></div><div class="np-bar"></div><div class="np-bar"></div>
      <div class="np-bar"></div><div class="np-bar"></div>
    </div>
  </div>

  <!-- REQUEST CARD: búsqueda + nombre en una sola tarjeta -->
  <div class="section">
    <div class="section-label label-pink">🎤 Pedir karaoke</div>
    <div class="request-card">
      <!-- Búsqueda -->
      <div class="card-search-wrap">
        <input type="text" id="search-input" placeholder="Busca canción o artista..." autocomplete="off">
        <button class="card-search-btn" onclick="triggerSearch()">Buscar</button>
      </div>
      <!-- Resultados inline -->
      <div id="results"></div>
      <!-- Canción seleccionada -->
      <div id="selected-song-box">
        <img class="selected-thumb" id="selected-thumb" src="" alt="">
        <div class="selected-info">
          <div class="selected-title" id="selected-title"></div>
          <div class="selected-ch" id="selected-ch">Canción seleccionada ✓</div>
        </div>
        <button class="selected-clear" onclick="clearSelected()" title="Cambiar canción">✕</button>
      </div>
      <!-- Nombre -->
      <div class="card-name-wrap">
        <input type="text" id="requester-name" maxlength="50" placeholder="Tu nombre o saludo al DJ 🎤">
      </div>
      <div class="card-hint">Escribe un saludo que leerá el locutor antes de tu karaoke</div>
      <!-- Botón enviar -->
      <button class="send-request-btn" id="send-btn" onclick="submitRequest()">
        Enviar pedido al DJ ✦
      </button>
    </div>
  </div>

  <!-- Top pedidos esta noche -->
  <div class="section">
    <div class="section-label label-yellow">🏆 Karaokes pedidos esta noche</div>
    <div id="top-list"><div class="top-empty">Aún sin pedidos esta noche</div></div>
  </div>

  <!-- Clásicos en español -->
  <div class="section">
    <div class="section-label label-purple">🎶 Clásicos para cantar</div>
  </div>
  <div class="carousel-wrap">
    <div class="carousel-track" id="classics-track"></div>
  </div>

  </div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SB_URL='https://dyyftbaniffvyeqmnayh.supabase.co';
var SB_KEY='sb_publishable_zeq17EOddIPy9r_8KdeLNg_ZDyTGOmU';
var YT_API='AIzaSyDq6GTi3IotPnwWPuFCjxJGdxJPmVjhgnQ';
var PUB_ID=new URLSearchParams(window.location.search).get('pub')||'default';
var sb=supabase.createClient(SB_URL,SB_KEY);
var selectedVideo=null; // {videoId, title, thumb, channel}

function sbFetch(path,opts){
  var h={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
  if(opts&&opts.prefer)h['Prefer']=opts.prefer;
  return fetch(SB_URL+'/rest/v1/'+path,{method:opts&&opts.method?opts.method:'GET',headers:h,body:opts&&opts.body?JSON.stringify(opts.body):undefined}).then(function(r){return r.json();});
}

// Search
function triggerSearch(){
  var q=document.getElementById('search-input').value.trim();
  var res=document.getElementById('results');
  if(q.length<2){res.style.display='none';res.innerHTML='';return;}
  res.style.display='block';
  res.innerHTML='<div class="search-hint">Buscando...</div>';
  fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=5&q='+encodeURIComponent(q+' karaoke')+'&key='+YT_API)
    .then(function(r){return r.json();}).then(function(data){
      if(!data.items||!data.items.length){res.innerHTML='<div class="search-hint">Sin resultados</div>';return;}
      var html='';
      data.items.forEach(function(item){
        var title=item.snippet.title.replace(/'/g,"\\'").replace(/"/g,'&quot;');
        var vid=item.id.videoId,thumb=item.snippet.thumbnails.default.url,ch=item.snippet.channelTitle.replace(/'/g,"\\'");
        html+='<div class="result-item">';
        html+='<img class="result-thumb" src="'+thumb+'" onerror="this.style.display=\'none\'">';
        html+='<div class="result-info"><div class="result-title">'+item.snippet.title+'</div><div class="result-channel">'+item.snippet.channelTitle+'</div></div>';
        html+='<button class="result-pick" onclick="selectSong(\''+vid+'\',\''+title+'\',\''+thumb+'\',\''+ch+'\')">Elegir</button>';
        html+='</div>';
      });
      res.innerHTML=html;
    }).catch(function(){res.innerHTML='<div class="search-hint">Error al buscar</div>';});
}
var _si=document.getElementById('search-input');if(_si)_si.addEventListener('keydown',function(e){if(e.key==='Enter')triggerSearch();});

function selectSong(videoId,title,thumb,channel){
  selectedVideo={videoId:videoId,title:title,thumb:thumb,channel:channel};
  document.getElementById('results').style.display='none';
  document.getElementById('search-input').value='';
  document.getElementById('selected-thumb').src=thumb;
  document.getElementById('selected-title').textContent=title;
  document.getElementById('selected-song-box').style.display='flex';
  document.getElementById('requester-name').focus();
}
function clearSelected(){
  selectedVideo=null;
  document.getElementById('selected-song-box').style.display='none';
  document.getElementById('search-input').focus();
}

// Submit full request
function submitRequest(){
  var name=document.getElementById('requester-name').value.trim();
  if(!selectedVideo){showToast('⚠️ Primero busca y elige una canción');return;}
  if(!name){
    document.getElementById('requester-name').style.borderColor='rgba(255,45,155,0.6)';
    setTimeout(function(){document.getElementById('requester-name').style.borderColor='';},1500);
    showToast('⚠️ Escribe tu nombre o saludo');return;
  }
  var btn=document.getElementById('send-btn');
  btn.disabled=true;btn.textContent='Enviando...';
  sbFetch('karaoke_requests',{method:'POST',prefer:'return=representation',body:[{
    title:selectedVideo.title,video_id:selectedVideo.videoId,
    pub_id:PUB_ID,status:'pending',requester_name:name
  }]}).then(function(){
    showToast('✦ Pedido enviado al DJ');
    clearSelected();
    document.getElementById('requester-name').value='';
    loadData();
  }).catch(function(){showToast('✦ Pedido enviado');})
  .finally(function(){btn.disabled=false;btn.textContent='Enviar pedido al DJ ✦';});
}

// Request from top
function requestFromTop(videoId,title){
  if(selectedVideo&&selectedVideo.videoId===videoId){showToast('Ya tienes esa canción seleccionada');return;}
  selectedVideo={videoId:videoId,title:title,thumb:'',channel:''};
  document.getElementById('selected-thumb').src='';
  document.getElementById('selected-thumb').style.display='none';
  document.getElementById('selected-title').textContent=title;
  document.getElementById('selected-song-box').style.display='flex';
  document.getElementById('requester-name').focus();
  document.getElementById('requester-name').scrollIntoView({behavior:'smooth',block:'center'});
}

function sendMsg(){
  var inp=document.getElementById('msg-input'),text=inp.value.trim();
  if(!text)return;inp.value='';
  sbFetch('karaoke_messages',{method:'POST',prefer:'return=representation',body:[{text:text,pub_id:PUB_ID}]})
    .then(function(){showToast('💬 Saludo enviado');loadData();}).catch(function(){});
}
var _mi=document.getElementById('msg-input');if(_mi)_mi.addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});
var _rn=document.getElementById('requester-name');if(_rn)_rn.addEventListener('keydown',function(e){if(e.key==='Enter')submitRequest();});

function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

function renderTop(){
  sbFetch('karaoke_top?pub_id=eq.'+PUB_ID+'&order=request_count.desc&limit=10').then(function(data){
    var el=document.getElementById('top-list');
    if(!Array.isArray(data)||!data.length){el.innerHTML='<div class="top-empty">Aún sin pedidos esta noche</div>';return;}
    var colors=['c0','c1','c2','c3'];
    var html='';
    data.forEach(function(item,i){
      var title=item.title||'';
      var colorClass=i>2?(' top-'+colors[i%4]):'';
      html+='<div class="top-item'+colorClass+'" data-vid="'+item.video_id+'" data-title="'+title.replace(/"/g,'&quot;')+'" onclick="requestFromTop(this.dataset.vid,this.dataset.title)">'+
        '<div class="top-rank'+(i>2?' top-rank-other':'')+'">'+(i+1)+'</div>'+
        '<div class="top-info"><div class="top-title">'+title+'</div>'+
        '<div class="top-count">Pedido '+item.request_count+' '+(item.request_count===1?'vez':'veces')+'</div></div>'+
        '<button class="top-add">+ Pedir</button>'+
        '</div>';
    });
    el.innerHTML=html;
  }).catch(function(){});
}

function loadNowPlaying(){
  sbFetch('karaoke_state?pub_id=eq.'+PUB_ID+'&select=*').then(function(data){
    if(Array.isArray(data)&&data[0]&&data[0].now_playing){
      document.getElementById('np-title').textContent=data[0].now_playing;
      document.getElementById('np-bars').style.display='flex';
    } else {
      document.getElementById('np-title').textContent='Esperando canción...';
      document.getElementById('np-bars').style.display='none';
    }
  }).catch(function(){});
}

function renderClassics(){
  var track=document.getElementById('classics-track');
  if(!track)return;
  sbFetch('karaoke_classics?select=*&order=sort_order').then(function(data){
    var supabaseIds={};
    var merged=[];
    if(Array.isArray(data)&&data.length){
      data.forEach(function(c){
        merged.push({title:c.title,artist:c.artist,vid:c.video_id,emoji:c.emoji||'🎵'});
        supabaseIds[c.video_id]=true;
      });
    }
    CLASSICS.forEach(function(c){
      if(!supabaseIds[c.vid]) merged.push(c);
    });
    renderCarousel(merged.length?merged:CLASSICS);
  }).catch(function(){ renderCarousel(CLASSICS); });
}

function renderCarousel(list){
  var track=document.getElementById('classics-track');
  if(!track)return;
  var html='';
  list.forEach(function(c,i){
    var g='car-g'+(i%6);
    html+='<div class="car-card '+g+'" data-idx="'+i+'">';
    html+='<div class="car-emoji">'+c.emoji+'</div>';
    html+='<button class="car-pick-btn">+ Pedir</button>';
    html+='<div class="car-info">';
    html+='<div class="car-title">'+c.title+'</div>';
    html+='<div class="car-artist">'+c.artist+'</div>';
    html+='</div></div>';
  });
  track.innerHTML=html;
  track.removeEventListener('click',trackClickHandler);
  track._list=list;
  track.addEventListener('click',trackClickHandler);
}

function trackClickHandler(e){
  var card=e.target.closest('.car-card');
  if(!card)return;
  var idx=parseInt(card.getAttribute('data-idx'));
  var list=this._list||CLASSICS;
  var c=list[idx];
  if(c)pickClassic(c.vid,c.title+' karaoke',c.artist);
}

function pickClassic(videoId,title,artist){
  selectedVideo={videoId:videoId,title:title,thumb:'https://img.youtube.com/vi/'+videoId+'/mqdefault.jpg',channel:artist};
  document.getElementById('selected-thumb').src=selectedVideo.thumb;
  document.getElementById('selected-thumb').style.display='block';
  document.getElementById('selected-title').textContent=title;
  document.getElementById('selected-song-box').style.display='flex';
  document.getElementById('requester-name').focus();
  // Scroll up to request card
  document.querySelector('.request-card').scrollIntoView({behavior:'smooth',block:'center'});
}

function loadData(){renderTop();loadNowPlaying();}

function connectRealtime(){
  sb.channel('karaoke-pub-'+PUB_ID)
    .on('postgres_changes',{event:'*',schema:'public',table:'karaoke_requests',filter:'pub_id=eq.'+PUB_ID},function(){renderTop();})
    .on('postgres_changes',{event:'*',schema:'public',table:'karaoke_state',filter:'pub_id=eq.'+PUB_ID},function(){loadNowPlaying();})
    .on('postgres_changes',{event:'*',schema:'public',table:'karaoke_top',filter:'pub_id=eq.'+PUB_ID},function(){renderTop();})
    .subscribe();

  // Classics se actualizan en tiempo real (sin filtro de pub, son globales)
  sb.channel('karaoke-classics-global')
    .on('postgres_changes',{event:'*',schema:'public',table:'karaoke_classics'},function(){
      renderClassics();
    })
    .subscribe();
}

  if(!e.target.closest('.request-card'))document.getElementById('results').style.display='none';
});

});
