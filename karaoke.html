<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Karaoke Night</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0e;
  --surface: #141416;
  --surface2: #1c1c1f;
  --border: rgba(255,255,255,0.07);
  --gold: #d4a853;
  --gold2: #f0c96a;
  --text: #f0ede8;
  --muted: #6b6860;
  --green: #4ade80;
  --red: #f87171;
  --white: #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow-x:hidden; }

/* Grain overlay */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
}

/* Ambient glow */
body::after {
  content:'';
  position:fixed; top:-40%; left:50%; transform:translateX(-50%);
  width:600px; height:400px;
  background: radial-gradient(ellipse, rgba(212,168,83,0.06) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}

.app { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; }

/* Header */
header {
  padding: 20px 20px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-family:'DM Serif Display',serif;
  font-size: 1.4rem;
  color: var(--gold);
  letter-spacing: -0.02em;
}
.logo span { color: var(--text); opacity:.5; font-style:italic; font-size:.9rem; margin-left:6px; }
.live-pill {
  display:flex; align-items:center; gap:6px;
  background: rgba(212,168,83,0.1);
  border: 1px solid rgba(212,168,83,0.2);
  border-radius: 20px; padding: 5px 12px;
  font-size: .7rem; letter-spacing: 1.5px; text-transform:uppercase;
  color: var(--gold);
}
.live-dot { width:6px; height:6px; background:var(--gold); border-radius:50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.6)} }

/* Now playing banner */
#now-playing-bar {
  margin: 16px 20px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
  min-height: 52px;
}
.np-icon { font-size: 1.2rem; flex-shrink:0; }
.np-info { flex:1; overflow:hidden; }
.np-label { font-size:.62rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:2px; }
.np-title { font-size:.9rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--gold); }
.bars { display:flex; align-items:flex-end; gap:2px; height:16px; flex-shrink:0; }
.bar { width:3px; background:var(--gold); border-radius:2px; animation:barAnim .7s infinite alternate; }
.bar:nth-child(2){animation-delay:.15s}.bar:nth-child(3){animation-delay:.3s}.bar:nth-child(4){animation-delay:.45s}
@keyframes barAnim{from{height:3px}to{height:14px}}

/* Search */
.search-section { padding: 16px 20px 0; }
.search-label { font-size:.7rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.search-box {
  display:flex; gap:8px; align-items:center;
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding: 0 16px 0 16px;
  transition: border-color .2s;
}
.search-box:focus-within { border-color: rgba(212,168,83,0.4); }
.search-box input {
  flex:1; background:transparent; border:none; outline:none;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:.95rem;
  padding: 14px 0;
}
.search-box input::placeholder { color:var(--muted); }
.search-btn {
  background:var(--gold); border:none; border-radius:8px;
  color:#0c0c0e; font-weight:600; font-size:.78rem;
  padding:8px 14px; cursor:pointer; white-space:nowrap;
  font-family:'DM Sans',sans-serif;
}
.search-btn:active { opacity:.8; transform:scale(.97); }

/* Results */
#results {
  margin: 10px 20px 0;
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; overflow:hidden; display:none;
}
.result-item {
  display:flex; align-items:center; gap:12px;
  padding: 12px 16px; border-bottom:1px solid var(--border);
  cursor:pointer; transition:background .15s;
  -webkit-tap-highlight-color: transparent;
}
.result-item:last-child { border-bottom:none; }
.result-item:active { background: rgba(212,168,83,0.06); }
.result-thumb { width:48px; height:36px; object-fit:cover; border-radius:6px; flex-shrink:0; }
.result-info { flex:1; overflow:hidden; }
.result-title { font-size:.85rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.result-channel { font-size:.72rem; color:var(--muted); }
.result-add {
  background:transparent; border:1px solid rgba(212,168,83,0.3);
  border-radius:8px; color:var(--gold); font-size:.75rem;
  padding:6px 12px; cursor:pointer; font-weight:500; white-space:nowrap;
  font-family:'DM Sans',sans-serif; transition: all .15s;
}
.result-add:active { background:var(--gold); color:#0c0c0e; }
.search-hint { padding:16px; text-align:center; color:var(--muted); font-size:.85rem; }

/* Top karaokes */
.section { padding: 16px 20px 0; }
.section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.section-label { font-size:.7rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.section-sub { font-size:.7rem; color:var(--muted); opacity:.6; }
#top-list { display:flex; flex-direction:column; gap:6px; }
.top-item {
  display:flex; align-items:center; gap:12px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:10px 14px; cursor:pointer;
  transition: all .15s;
}
.top-item:active { border-color:rgba(212,168,83,0.3); background:rgba(212,168,83,0.04); }
.top-rank {
  font-family:'DM Serif Display',serif; font-size:1.1rem;
  color:var(--muted); min-width:24px; text-align:center;
}
.top-rank.gold { color:var(--gold); }
.top-rank.silver { color:#a0a0a0; }
.top-rank.bronze { color:#cd7f32; }
.top-info { flex:1; overflow:hidden; }
.top-title { font-size:.85rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.top-artist { font-size:.72rem; color:var(--muted); margin-top:1px; }
.top-count { font-size:.72rem; color:var(--muted); white-space:nowrap; }
.top-add {
  background:transparent; border:1px solid rgba(212,168,83,0.2);
  border-radius:8px; color:var(--gold); font-size:.72rem;
  padding:5px 10px; cursor:pointer; font-family:'DM Sans',sans-serif;
  transition: all .15s; flex-shrink:0;
}
.top-add:active { background:var(--gold); color:#0c0c0e; }
.top-empty { padding:20px; text-align:center; color:var(--muted); font-size:.85rem; }

/* Messages */
.section.msgs { padding-bottom: 100px; }
.msg-box {
  display:flex; gap:8px;
}
.msg-input {
  flex:1; background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:13px 16px;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:.9rem;
  outline:none; transition:border-color .2s;
}
.msg-input:focus { border-color:rgba(212,168,83,0.3); }
.msg-input::placeholder { color:var(--muted); }
.msg-send {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:0 16px; color:var(--gold);
  font-size:1.1rem; cursor:pointer; transition:all .15s;
}
.msg-send:active { background:rgba(212,168,83,0.1); }
#msg-list { display:flex; flex-direction:column; gap:6px; margin-top:10px; max-height:180px; overflow-y:auto; }
.msg-item {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:10px 14px;
  display:flex; gap:10px; align-items:flex-start;
}
.msg-bubble { font-size:.85rem; line-height:1.4; flex:1; }
.msg-time { font-size:.68rem; color:var(--muted); white-space:nowrap; margin-top:2px; }
.msg-empty { color:var(--muted); font-size:.82rem; text-align:center; padding:16px; }

/* Toast */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--surface); border:1px solid rgba(212,168,83,0.3);
  border-radius:30px; padding:12px 24px;
  font-size:.85rem; font-weight:500; color:var(--gold);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  z-index:999; pointer-events:none; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">karaoke<span>night</span></div>
    <div class="live-pill"><div class="live-dot"></div>EN VIVO</div>
  </header>

  <!-- Now playing -->
  <div id="now-playing-bar">
    <div class="np-icon">🎤</div>
    <div class="np-info">
      <div class="np-label">Sonando ahora</div>
      <div class="np-title" id="np-title">Esperando canción...</div>
    </div>
    <div class="bars" id="np-bars" style="display:none">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-section">
    <div class="search-label">Pedir karaoke</div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Busca canción o artista..." autocomplete="off">
      <button class="search-btn" onclick="triggerSearch()">Buscar</button>
    </div>
  </div>
  <div id="results"></div>

  <!-- Top karaokes -->
  <div class="section">
    <div class="section-header">
      <div class="section-label">🏆 Más pedidos esta noche</div>
    </div>
    <div id="top-list"><div class="top-empty">Aún no hay pedidos esta noche</div></div>
  </div>

  <!-- Mensajes -->
  <div class="section msgs">
    <div class="section-header">
      <div class="section-label">💬 Saludos al DJ</div>
    </div>
    <div class="msg-box">
      <input type="text" class="msg-input" id="msg-input" placeholder="Manda un saludo..." maxlength="100">
      <button class="msg-send" onclick="sendMsg()">↑</button>
    </div>
    <div id="msg-list"><div class="msg-empty">Sé el primero en mandar un saludo</div></div>
  </div>
</div>
<div class="toast" id="toast">✓ Karaoke enviado al DJ</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SB_URL='https://dyyftbaniffvyeqmnayh.supabase.co';
var SB_KEY='sb_publishable_zeq17EOddIPy9r_8KdeLNg_ZDyTGOmU';
var YT_API='AIzaSyDq6GTi3IotPnwWPuFCjxJGdxJPmVjhgnQ';
var PUB_ID = new URLSearchParams(window.location.search).get('pub') || 'default';
var sb=supabase.createClient(SB_URL,SB_KEY);
var messages=[], requests=[];

function sbFetch(path,opts){
  var h={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
  if(opts&&opts.prefer)h['Prefer']=opts.prefer;
  return fetch(SB_URL+'/rest/v1/'+path,{method:opts&&opts.method?opts.method:'GET',headers:h,body:opts&&opts.body?JSON.stringify(opts.body):undefined}).then(function(r){return r.json();});
}

// Search
function triggerSearch(){
  var q=document.getElementById('search-input').value.trim();
  var res=document.getElementById('results');
  if(q.length<2){res.style.display='none';res.innerHTML='';return;}
  res.style.display='block';
  res.innerHTML='<div class="search-hint">Buscando...</div>';
  fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=6&q='+encodeURIComponent(q+' karaoke')+'&key='+YT_API)
    .then(function(r){return r.json();}).then(function(data){
      if(!data.items||!data.items.length){res.innerHTML='<div class="search-hint">Sin resultados</div>';return;}
      var html='';
      data.items.forEach(function(item){
        var title=item.snippet.title.replace(/'/g,"\\'").replace(/"/g,'&quot;');
        var vid=item.id.videoId,thumb=item.snippet.thumbnails.default.url,ch=item.snippet.channelTitle;
        html+='<div class="result-item">';
        html+='<img class="result-thumb" src="'+thumb+'" onerror="this.style.display=\'none\'">';
        html+='<div class="result-info"><div class="result-title">'+item.snippet.title+'</div><div class="result-channel">'+ch+'</div></div>';
        html+='<button class="result-add" onclick="requestSong(\''+vid+'\',\''+title+'\')">+ Pedir</button>';
        html+='</div>';
      });
      res.innerHTML=html;
    }).catch(function(){res.innerHTML='<div class="search-hint">Error al buscar</div>';});
}
document.getElementById('search-input').addEventListener('keydown',function(e){if(e.key==='Enter')triggerSearch();});
document.getElementById('search-input').addEventListener('input',function(){
  if(this.value.trim().length<2){var r=document.getElementById('results');r.style.display='none';r.innerHTML='';}
});

// Request a song
function requestSong(videoId,title){
  document.getElementById('results').style.display='none';
  document.getElementById('search-input').value='';
  sbFetch('karaoke_requests',{method:'POST',prefer:'return=representation',body:[{title:title,video_id:videoId,pub_id:PUB_ID,status:'pending',request_count:1}]})
    .then(function(){ showToast('✓ Pedido enviado al DJ'); loadData(); })
    .catch(function(){ showToast('✓ Pedido enviado'); });
}

// Request from top list
function requestFromTop(videoId,title){
  // Incrementar contador
  sbFetch('karaoke_top?pub_id=eq.'+PUB_ID+'&video_id=eq.'+encodeURIComponent(videoId),{}).then(function(data){
    if(Array.isArray(data)&&data[0]){
      sbFetch('karaoke_top?id=eq.'+data[0].id,{method:'PATCH',body:{request_count:data[0].request_count+1}}).catch(function(){});
    }
  });
  requestSong(videoId,title);
}

function sendMsg(){
  var inp=document.getElementById('msg-input'),text=inp.value.trim();
  if(!text)return; inp.value='';
  sbFetch('karaoke_messages',{method:'POST',prefer:'return=representation',body:[{text:text,pub_id:PUB_ID}]})
    .then(function(){showToast('💬 Saludo enviado');loadData();}).catch(function(){});
}
document.getElementById('msg-input').addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});

function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

// Render top
function renderTop(){
  var el=document.getElementById('top-list');
  sbFetch('karaoke_top?pub_id=eq.'+PUB_ID+'&order=request_count.desc&limit=10').then(function(data){
    if(!Array.isArray(data)||!data.length){el.innerHTML='<div class="top-empty">Aún no hay pedidos esta noche</div>';return;}
    var ranks=['gold','silver','bronze'];
    var html='';
    data.forEach(function(item,i){
      var rankCls=ranks[i]||'';
      var title=item.title||'';
      var artist=title.match(/[-–|]/)?title.split(/[-–|]/)[0].trim():'';
      html+='<div class="top-item" onclick="requestFromTop(\''+item.video_id+'\',\''+title.replace(/'/g,"\\'")+'\')">';
      html+='<div class="top-rank '+rankCls+'">'+(i+1)+'</div>';
      html+='<div class="top-info"><div class="top-title">'+title+'</div>';
      if(artist)html+='<div class="top-artist">'+artist+'</div>';
      html+='</div>';
      html+='<div class="top-count">×'+item.request_count+'</div>';
      html+='<button class="top-add">+ Pedir</button>';
      html+='</div>';
    });
    el.innerHTML=html;
  }).catch(function(){});
}

// Render messages
function renderMessages(){
  sbFetch('karaoke_messages?pub_id=eq.'+PUB_ID+'&order=created_at.desc&limit=20').then(function(data){
    var el=document.getElementById('msg-list');
    if(!Array.isArray(data)||!data.length){el.innerHTML='<div class="msg-empty">Sé el primero en mandar un saludo</div>';return;}
    var html='';
    data.forEach(function(m){
      var time=m.created_at?new Date(m.created_at).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}):'';
      html+='<div class="msg-item"><div class="msg-bubble">'+m.text+'</div><div class="msg-time">'+time+'</div></div>';
    });
    el.innerHTML=html;
  }).catch(function(){});
}

// Now playing
function loadNowPlaying(){
  sbFetch('karaoke_state?pub_id=eq.'+PUB_ID+'&select=*').then(function(data){
    if(Array.isArray(data)&&data[0]&&data[0].now_playing){
      document.getElementById('np-title').textContent=data[0].now_playing;
      document.getElementById('np-bars').style.display='flex';
    } else {
      document.getElementById('np-title').textContent='Esperando canción...';
      document.getElementById('np-bars').style.display='none';
    }
  }).catch(function(){});
}

function loadData(){ renderTop(); renderMessages(); loadNowPlaying(); }

// Realtime
function connectRealtime(){
  sb.channel('karaoke-pub-'+PUB_ID)
    .on('postgres_changes',{event:'*',schema:'public',table:'karaoke_requests',filter:'pub_id=eq.'+PUB_ID},function(){renderTop();})
    .on('postgres_changes',{event:'*',schema:'public',table:'karaoke_messages',filter:'pub_id=eq.'+PUB_ID},function(){renderMessages();})
    .on('postgres_changes',{event:'*',schema:'public',table:'karaoke_state',filter:'pub_id=eq.'+PUB_ID},function(){loadNowPlaying();})
    .on('postgres_changes',{event:'*',schema:'public',table:'karaoke_top',filter:'pub_id=eq.'+PUB_ID},function(){renderTop();})
    .subscribe();
}

document.addEventListener('click',function(e){
  if(!e.target.closest('.search-box')&&!e.target.closest('#results'))document.getElementById('results').style.display='none';
});

loadData();
connectRealtime();
setInterval(loadData,5000);
</script>
</body>
</html>
