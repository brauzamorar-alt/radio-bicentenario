<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin - Radio Escolar</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--navy2:#0f2040;--panel:#111d33;--panel2:#162238;--accent:#e63946;--gold:#f4b942;--green:#22c55e;--blue:#3b82f6;--text:#e8edf5;--muted:#7a8fa6;--border:#1e3050;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--navy);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
#login-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:1000;}
.login-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:40px 32px;width:320px;text-align:center;}
.login-box h2{font-family:'Oswald',sans-serif;font-size:1.5rem;margin-bottom:4px;color:var(--gold);}
.login-box p{font-size:.8rem;color:var(--muted);margin-bottom:24px;letter-spacing:1px;}
.login-box input{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-size:1rem;text-align:center;letter-spacing:3px;margin-bottom:12px;outline:none;font-family:'Inter',sans-serif;}
.login-btn{width:100%;background:var(--gold);border:none;border-radius:10px;padding:12px;color:var(--navy);font-size:1rem;font-weight:700;cursor:pointer;font-family:'Oswald',sans-serif;}
.login-error{color:var(--accent);font-size:.82rem;margin-top:10px;display:none;}
header{background:var(--navy2);border-bottom:2px solid var(--gold);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
header h1{font-family:'Oswald',sans-serif;font-size:1.2rem;color:var(--gold);}
header span{font-size:.72rem;color:var(--muted);}
.content{padding:20px;max-width:900px;margin:0 auto;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;}
.stat-num{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;color:var(--gold);}
.stat-label{font-size:.75rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px;}
.section-title{font-family:'Oswald',sans-serif;font-size:.85rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.add-school-btn{background:var(--green);border:none;border-radius:8px;padding:8px 16px;color:#0a2010;font-size:.8rem;font-weight:700;cursor:pointer;}
.schools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:24px;}
.school-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;position:relative;}
.school-card .color-bar{height:4px;border-radius:4px;margin-bottom:12px;}
.school-name{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:500;margin-bottom:2px;}
.school-city{font-size:.78rem;color:var(--muted);margin-bottom:12px;}
.school-id{font-size:.72rem;color:var(--border);font-family:monospace;margin-bottom:12px;}
.school-stats{display:flex;gap:16px;margin-bottom:14px;}
.school-stat{text-align:center;}
.school-stat-num{font-family:'Oswald',sans-serif;font-size:1.1rem;color:var(--text);}
.school-stat-lbl{font-size:.68rem;color:var(--muted);}
.school-actions{display:flex;gap:8px;}
.btn-link{flex:1;text-align:center;padding:8px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;text-decoration:none;}
.btn-admin{background:rgba(59,130,246,.15);border:1px solid var(--blue);color:var(--blue);}
.btn-view{background:rgba(34,197,94,.15);border:1px solid var(--green);color:var(--green);}
.btn-delete{background:rgba(230,57,70,.12);border:1px solid var(--accent);color:var(--accent);}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.active{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:400px;}
.modal h3{font-family:'Oswald',sans-serif;font-size:1.2rem;margin-bottom:20px;}
.modal-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.modal-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.modal-input{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;outline:none;width:100%;}
.modal-input:focus{border-color:var(--gold);}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.modal-save{flex:1;background:var(--green);border:none;border-radius:10px;padding:12px;color:#0a2010;font-weight:700;cursor:pointer;font-size:.9rem;}
.modal-cancel{flex:1;background:transparent;border:1px solid var(--border);border-radius:10px;padding:12px;color:var(--muted);cursor:pointer;font-size:.9rem;}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <h2>Super Admin</h2>
    <p>Radio Escolar - MAS360</p>
    <input type="password" id="sa-pwd" placeholder="Contrasena" onkeydown="if(event.key==='Enter')saLogin()">
    <button class="login-btn" onclick="saLogin()">INGRESAR</button>
    <div class="login-error" id="sa-error">Contrasena incorrecta</div>
  </div>
</div>

<div id="main" style="display:none">
  <header>
    <h1>Super Admin - Radio Escolar</h1>
    <span>MAS360 GROUP</span>
  </header>
  <div class="content">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="stat-schools">-</div><div class="stat-label">Colegios</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-songs">-</div><div class="stat-label">Canciones hoy</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-msgs">-</div><div class="stat-label">Mensajes hoy</div></div>
    </div>
    <div class="section-title">
      <span>Colegios registrados</span>
      <button class="add-school-btn" onclick="openModal()">+ Agregar colegio</button>
    </div>
    <div class="schools-grid" id="schools-grid">Cargando...</div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Nuevo colegio</h3>
    <div class="modal-row"><span class="modal-label">ID unico (sin espacios)</span><input type="text" class="modal-input" id="m-id" placeholder="ej: liceo-providencia"></div>
    <div class="modal-row"><span class="modal-label">Nombre del establecimiento</span><input type="text" class="modal-input" id="m-name" placeholder="ej: Liceo de Providencia"></div>
    <div class="modal-row"><span class="modal-label">Ciudad</span><input type="text" class="modal-input" id="m-city" placeholder="ej: Santiago"></div>
    <div class="modal-row"><span class="modal-label">Contrasena del admin</span><input type="text" class="modal-input" id="m-pwd" placeholder="ej: radio2025"></div>
    <div class="modal-row"><span class="modal-label">Color principal</span><input type="color" class="modal-input" id="m-color" value="#e63946" style="height:44px;padding:4px;"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-save" onclick="saveSchool()">Guardar</button>
    </div>
  </div>
</div>

<script>
var SB_URL = 'https://ohrjuewpnhuefxqailye.supabase.co';
var SB_KEY = 'sb_publishable_hZxknQzUmTFJsOr88ndSkw_bE8L8GFu';
var SA_PWD = 'BrauSuperAdmin2025';
var schools = [], allSongs = [], allMsgs = [];

function sbFetch(path, opts) {
  var headers = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };
  if (opts && opts.prefer) headers['Prefer'] = opts.prefer;
  return fetch(SB_URL + '/rest/v1/' + path, {
    method: opts && opts.method ? opts.method : 'GET',
    headers: headers,
    body: opts && opts.body ? JSON.stringify(opts.body) : undefined
  }).then(function(r) { return r.json(); });
}

function saLogin() {
  if (document.getElementById('sa-pwd').value === SA_PWD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    sessionStorage.setItem('sa_ok', '1');
    loadAll();
  } else {
    var e = document.getElementById('sa-error');
    e.style.display = 'block';
    setTimeout(function() { e.style.display = 'none'; }, 2500);
  }
}
if (sessionStorage.getItem('sa_ok') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  loadAll();
}

function loadAll() {
  sbFetch('schools?select=*&order=created_at').then(function(s) {
    if (Array.isArray(s)) { schools = s; renderSchools(); document.getElementById('stat-schools').textContent = s.length; }
  });
  var today = new Date(); today.setHours(0,0,0,0);
  sbFetch('songs?select=*&created_at=gte.' + today.toISOString()).then(function(s) {
    if (Array.isArray(s)) { allSongs = s; document.getElementById('stat-songs').textContent = s.length; }
  });
  sbFetch('messages?select=*&created_at=gte.' + today.toISOString()).then(function(m) {
    if (Array.isArray(m)) { allMsgs = m; document.getElementById('stat-msgs').textContent = m.length; }
  });
}

function renderSchools() {
  var el = document.getElementById('schools-grid');
  if (!schools.length) { el.innerHTML = '<div style="color:var(--muted);padding:20px">Sin colegios registrados</div>'; return; }
  var html = '';
  for (var i = 0; i < schools.length; i++) {
    var s = schools[i];
    var color = s.color || '#e63946';
    var songs = allSongs.filter(function(x) { return x.school_id === s.id; }).length;
    var msgs = allMsgs.filter(function(x) { return x.school_id === s.id; }).length;
    var base = window.location.origin + window.location.pathname.replace('superadmin.html','');
    html += '<div class="school-card">';
    html += '<div class="color-bar" style="background:' + color + '"></div>';
    html += '<div class="school-name">' + s.name + '</div>';
    html += '<div class="school-city">' + (s.city || '') + '</div>';
    html += '<div class="school-id">ID: ' + s.id + '</div>';
    html += '<div class="school-stats"><div class="school-stat"><div class="school-stat-num">' + songs + '</div><div class="school-stat-lbl">canciones hoy</div></div>';
    html += '<div class="school-stat"><div class="school-stat-num">' + msgs + '</div><div class="school-stat-lbl">mensajes hoy</div></div></div>';
    html += '<div class="school-actions">';
    html += '<a class="btn-link btn-view" href="index.html?school=' + s.id + '" target="_blank">Ver pantalla</a>';
    html += '<a class="btn-link btn-admin" href="admin.html?school_hint=' + s.id + '" target="_blank">Admin</a>';
    html += '<button class="btn-link btn-delete" onclick="deleteSchool(\'' + s.id + '\')">Borrar</button>';
    html += '</div></div>';
  }
  el.innerHTML = html;
}

function openModal() {
  document.getElementById('m-id').value = '';
  document.getElementById('m-name').value = '';
  document.getElementById('m-city').value = '';
  document.getElementById('m-pwd').value = 'radio2025';
  document.getElementById('m-color').value = '#e63946';
  document.getElementById('modal').classList.add('active');
}
function closeModal() { document.getElementById('modal').classList.remove('active'); }

function saveSchool() {
  var id = document.getElementById('m-id').value.trim().toLowerCase().replace(/\s+/g,'-');
  var name = document.getElementById('m-name').value.trim();
  var city = document.getElementById('m-city').value.trim();
  var pwd = document.getElementById('m-pwd').value.trim();
  var color = document.getElementById('m-color').value;
  if (!id || !name || !pwd) { alert('Completa todos los campos obligatorios'); return; }
  sbFetch('schools', { method: 'POST', prefer: 'return=representation', body: [{ id: id, name: name, city: city, admin_password: pwd, color: color }] })
    .then(function(res) {
      if (Array.isArray(res) && res[0]) { closeModal(); loadAll(); alert('Colegio creado: ' + name); }
      else { alert('Error: el ID ya existe o hubo un problema'); }
    }).catch(function() { alert('Error al crear el colegio'); });
}

function deleteSchool(id) {
  if (!confirm('Eliminar el colegio "' + id + '" y todos sus datos?')) return;
  Promise.all([
    sbFetch('songs?school_id=eq.' + id, { method: 'DELETE' }),
    sbFetch('messages?school_id=eq.' + id, { method: 'DELETE' }),
    sbFetch('schools?id=eq.' + id, { method: 'DELETE' })
  ]).then(function() { loadAll(); }).catch(function() { alert('Error al eliminar'); });
}
</script>
</body>
</html>
