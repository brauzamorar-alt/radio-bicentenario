<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Radio Escolar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06040f;--neon-pink:#ff2d9b;--neon-blue:#00d4ff;--neon-purple:#b44fff;
  --neon-yellow:#ffe600;--neon-green:#22c55e;
  --surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--text:#f5f0ff;--muted:rgba(255,255,255,0.35);
  --accent:#ff2d9b;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 40% at 20% 0%,rgba(180,79,255,0.15) 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 80% 10%,rgba(0,212,255,0.1) 0%,transparent 60%),
  radial-gradient(ellipse 50% 60% at 50% 100%,rgba(255,45,155,0.08) 0%,transparent 60%);}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px;}
#loading h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--text);letter-spacing:2px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--neon-purple);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error */
#error-screen{display:none;position:fixed;inset:0;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:20px;z-index:999;}
#error-screen h2{font-family:'Bebas Neue',sans-serif;color:var(--neon-pink);}
#error-screen p{color:var(--muted);}

/* Locutor banner */
#locutor-banner{display:none;position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  background:rgba(10,6,20,0.97);border:1px solid rgba(255,230,0,0.4);border-radius:20px;
  padding:8px 18px;font-size:.8rem;color:var(--neon-yellow);z-index:998;pointer-events:none;white-space:nowrap;
  box-shadow:0 0 16px rgba(255,230,0,0.2);}
#locutor-banner.show{display:block;}

/* Header */
header{background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(180,79,255,0.2);
  padding:14px 16px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;
  backdrop-filter:blur(20px);position:relative;}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;}
.header-logo .r{color:#fff;text-shadow:0 0 10px rgba(255,45,155,0.8);}
.header-logo .dash{color:var(--neon-purple);margin:0 3px;}
.header-logo .e{color:var(--neon-blue);text-shadow:0 0 10px rgba(0,212,255,0.8);}
.header-sub{font-size:.68rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.live-badge{margin-left:auto;display:flex;align-items:center;gap:6px;
  background:rgba(255,45,155,0.08);border:1px solid rgba(255,45,155,0.3);
  border-radius:20px;padding:5px 12px;font-size:.72rem;font-weight:600;
  color:var(--neon-pink);letter-spacing:1px;}
.live-dot{width:7px;height:7px;background:var(--neon-pink);border-radius:50%;
  box-shadow:0 0 6px var(--neon-pink);animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.5);opacity:.4}}
#conn-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;}
#conn-dot.ok{background:var(--neon-green);box-shadow:0 0 6px var(--neon-green);}
#conn-dot.err{background:var(--neon-pink);}

/* Player section */
.player-section{background:linear-gradient(135deg,rgba(180,79,255,0.1),rgba(0,212,255,0.06));
  border-bottom:1px solid rgba(180,79,255,0.2);padding:14px 16px;position:relative;overflow:hidden;z-index:1;}
.player-section::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--neon-pink),var(--neon-purple),var(--neon-blue));}
.now-playing-label{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--neon-purple);margin-bottom:6px;font-weight:600;}
.now-playing-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:1.5rem;
  text-shadow:0 0 20px rgba(255,45,155,0.3);}
.progress-bar{height:4px;background:rgba(255,255,255,0.08);border-radius:4px;margin-top:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--neon-pink),var(--neon-purple));border-radius:4px;width:0%;transition:width .5s linear;}

/* Sections */
.section{padding:16px 16px 0;position:relative;z-index:1;}
.section-title{font-size:.65rem;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:600;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.08),transparent);}

/* Search */
.search-wrap{position:relative;}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid rgba(180,79,255,0.2);
  border-radius:12px;padding:11px 80px 11px 40px;color:var(--text);
  font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s;}
.search-wrap input:focus{border-color:rgba(180,79,255,0.5);box-shadow:0 0 0 3px rgba(180,79,255,0.08);}
.search-wrap input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);}
.search-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);
  background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));border:none;
  border-radius:8px;color:#fff;font-size:.78rem;font-weight:600;padding:6px 12px;cursor:pointer;
  font-family:'Outfit',sans-serif;}
.search-btn:active{opacity:.85;}
#results{background:rgba(10,6,20,0.97);border:1px solid rgba(180,79,255,0.2);
  border-radius:12px;margin-top:6px;overflow:hidden;display:none;backdrop-filter:blur(20px);}
.result-item{padding:11px 14px;cursor:pointer;font-size:.88rem;border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;align-items:center;gap:10px;transition:background .15s;}
.result-item:last-child{border-bottom:none;}
.result-item:active{background:rgba(180,79,255,0.1);}
.add-btn{margin-left:auto;background:linear-gradient(135deg,rgba(255,45,155,0.2),rgba(180,79,255,0.2));
  border:1px solid rgba(255,45,155,0.4);border-radius:6px;color:var(--neon-pink);
  font-size:.75rem;padding:5px 10px;cursor:pointer;font-weight:600;white-space:nowrap;
  font-family:'Outfit',sans-serif;}
.search-loading{padding:12px 14px;color:var(--muted);font-size:.85rem;}

/* Queue */
#queue-list{display:flex;flex-direction:column;gap:6px;}
.queue-item{background:var(--surface2);border:1px solid var(--border);border-radius:11px;
  padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:.88rem;}
.queue-item.playing{border-color:rgba(255,45,155,0.4);background:rgba(255,45,155,0.06);}
.queue-num{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--muted);min-width:20px;}
.queue-item.playing .queue-num{color:var(--neon-pink);}
.bar{width:3px;background:var(--neon-pink);border-radius:2px;animation:bars .7s infinite alternate;display:inline-block;margin:0 1px;
  box-shadow:0 0 4px var(--neon-pink);}
.bar:nth-child(2){animation-delay:.15s;background:var(--neon-purple);}
.bar:nth-child(3){animation-delay:.3s;background:var(--neon-blue);}
@keyframes bars{from{height:4px}to{height:14px}}
.queue-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.queue-empty{text-align:center;color:var(--muted);font-size:.85rem;padding:20px;}

/* Messages */
.msg-input-wrap{display:flex;gap:8px;margin-bottom:10px;}
.msg-input-wrap input{flex:1;background:var(--surface2);border:1px solid rgba(0,212,255,0.2);
  border-radius:11px;padding:10px 14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.88rem;outline:none;}
.msg-input-wrap input::placeholder{color:var(--muted);}
.send-btn{background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));
  border:none;border-radius:11px;padding:10px 16px;color:#fff;font-weight:700;
  font-size:.85rem;cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif;}
#msg-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;}
.msg-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:9px 14px;font-size:.88rem;display:flex;gap:8px;align-items:flex-start;}
.msg-text{flex:1;line-height:1.4;}
.msg-time{font-size:.7rem;color:var(--muted);margin-top:2px;}
.msg-empty{color:var(--muted);font-size:.85rem;text-align:center;padding:16px;}

/* Toast */
.added-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  background:rgba(10,6,20,0.97);border:1px solid rgba(0,255,136,0.4);
  color:var(--neon-green);padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:600;
  transition:transform .3s ease;z-index:999;pointer-events:none;
  box-shadow:0 0 16px rgba(0,255,136,0.15);}
.added-toast.show{transform:translateX(-50%) translateY(0);}

footer{margin-top:auto;text-align:center;padding:10px;font-size:.68rem;color:rgba(255,255,255,0.1);
  letter-spacing:2px;position:relative;z-index:1;}

/* Hidden YT players */
#yt-player-a,#yt-player-b{position:absolute;top:-9999px;left:-9999px;width:1px;height:1px;}
</style>
</head>
<body>
<div id="yt-player-a"></div>
<div id="yt-player-b"></div>
<div id="loading"><div class="spinner"></div><h2>Cargando radio...</h2></div>
<div id="error-screen"><h2>Colegio no encontrado</h2><p>Verifica la URL e intenta nuevamente.</p></div>
<div id="locutor-banner">🎵 <span id="locutor-text"></span></div>

<header style="display:none" id="app-header">
  <div>
    <div class="header-logo"><span class="r">RADIO</span><span class="dash">—</span><span class="e">ESCOLAR</span></div>
    <div class="header-sub" id="school-city-h"></div>
  </div>
  <div class="live-badge"><div id="conn-dot"></div>&nbsp;<div class="live-dot"></div>EN VIVO</div>
</header>

<div class="player-section" style="display:none" id="app-player">
  <div class="now-playing-label">Reproduciendo ahora</div>
  <div class="now-playing-title" id="np-title">Esperando canciones...</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div id="app-content" style="display:none">
  <div class="section">
    <div class="section-title">🎵 Pedir canción</div>
    <div class="search-wrap">
      <span class="search-icon">🎵</span>
      <input type="text" id="search-input" placeholder="Busca un tema, artista..." autocomplete="off">
      <button class="search-btn" onclick="triggerSearch()">Buscar</button>
    </div>
    <div id="results"></div>
  </div>
  <div class="section">
    <div class="section-title">🎤 Lista de reproducción</div>
    <div id="queue-list"><div class="queue-empty">Sin canciones aún...</div></div>
  </div>
  <div class="section">
    <div class="section-title">💬 Saludos y mensajes</div>
    <div class="msg-input-wrap">
      <input type="text" id="msg-input" placeholder="Feliz cumple, saludos..." maxlength="120">
      <button class="send-btn" onclick="sendMsg()">Enviar</button>
    </div>
    <div id="msg-list"><div class="msg-empty">Sin mensajes aún...</div></div>
  </div>
  <footer id="app-footer">RADIO ESCOLAR</footer>
</div>
<div class="added-toast" id="toast">Canción agregada ✓</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SB_URL='https://dyyftbaniffvyeqmnayh.supabase.co';
var SB_KEY='sb_publishable_zeq17EOddIPy9r_8KdeLNg_ZDyTGOmU';
var sb=supabase.createClient(SB_URL,SB_KEY);
var schoolId='',school=null;
var songs=[],messages=[],currentIndex=-1;

// ── Dos players para mezcla DJ ────────────────────────────────────────────
var players={A:null,B:null};
var ready={A:false,B:false};
var active='A', nextSlot='B';
var DJ_MIX_SECS=5, MIX_STEPS=50;
var progressInterval=null, mixing=false;
var coroFlags={A:false,B:false};

// Opciones
var optCrossfade=true,optJingle=true,optLocutor=true,optJingleEnMezcla=true;
var customJingleUrl=null,customLocutorUrl=null;
var pendingState=null;

function sbFetch(path,opts){
  var h={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
  if(opts&&opts.prefer)h['Prefer']=opts.prefer;
  return fetch(SB_URL+'/rest/v1/'+path,{method:opts&&opts.method?opts.method:'GET',headers:h,body:opts&&opts.body?JSON.stringify(opts.body):undefined}).then(function(r){return r.json();});
}

// ── Jingle ────────────────────────────────────────────────────────────────
function playJingle(onEnd){
  if(!optJingle){if(onEnd)onEnd();return;}
  if(customJingleUrl){
    try{var a=new Audio(customJingleUrl);a.volume=0.85;a.play().catch(function(){if(onEnd)onEnd();});a.onended=function(){if(onEnd)onEnd();};a.onerror=function(){if(onEnd)onEnd();};return;}catch(e){}
  }
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var dur=2.5,rate=ctx.sampleRate,buf=ctx.createBuffer(1,rate*dur,rate),d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++){var t=i/rate;d[i]=Math.sin(2*Math.PI*(440+880*(t/dur))*t)*Math.exp(-t*1.2)*0.18;}
    var src=ctx.createBufferSource();src.buffer=buf;src.connect(ctx.destination);src.start(0);
    src.onended=function(){ctx.close();if(onEnd)onEnd();};
  }catch(e){if(onEnd)onEnd();}
}

// ── Locutor ───────────────────────────────────────────────────────────────
function speakTitle(title,onEnd){
  if(!optLocutor){if(onEnd)onEnd();return;}
  var clean=title.replace(/\(.*?\)/g,'').replace(/\[.*?\]/g,'').replace(/official|video|lyrics|hd|4k|mv|ft\.|feat\./gi,'').replace(/\s+/g,' ').trim().substring(0,60);
  var banner=document.getElementById('locutor-banner');
  document.getElementById('locutor-text').textContent='🎵 '+clean;
  banner.classList.add('show');setTimeout(function(){banner.classList.remove('show');},4000);
  if(customLocutorUrl){
    try{var a=new Audio(customLocutorUrl);a.volume=0.9;a.play().catch(function(){if(onEnd)onEnd();});a.onended=function(){if(onEnd)onEnd();};a.onerror=function(){if(onEnd)onEnd();};return;}catch(e){}
  }
  if(!window.speechSynthesis){if(onEnd)onEnd();return;}
  var u=new SpeechSynthesisUtterance('Ahora suena: '+clean);
  u.lang='es-CL';u.rate=0.95;u.pitch=1.05;u.volume=0.9;
  u.onend=u.onerror=function(){if(onEnd)onEnd();};
  window.speechSynthesis.cancel();window.speechSynthesis.speak(u);
}

// ── Seek al coro ──────────────────────────────────────────────────────────
var CORO_START = 60; // segundos para saltar intro/publicidad

function seekToCoro(key){
  if(coroFlags[key])return;
  coroFlags[key]=true;
  var pl=players[key];
  // Intentar seekTo inmediatamente y luego verificar
  var attempts=0;
  var doSeek=function(){
    attempts++;
    try{
      pl.seekTo(CORO_START,true);
    }catch(e){}
  };
  // Primer intento inmediato
  doSeek();
  // Reintentos por si el primero fue ignorado
  setTimeout(doSeek,500);
  setTimeout(doSeek,1500);
  setTimeout(doSeek,3000);
}

// ── Fade logarítmico ──────────────────────────────────────────────────────
function fadeVol(key,dir,steps,ms,cb){
  var pl=players[key],step=0;
  var iv=setInterval(function(){
    step++;
    var pct=step/steps;
    var vol=dir==='up'?Math.round(100*Math.pow(pct,0.5)):Math.round(100*Math.pow(1-pct,2));
    try{pl.setVolume(Math.min(100,Math.max(0,vol)));}catch(e){}
    if(step>=steps){clearInterval(iv);if(cb)cb();}
  },ms);
  return iv;
}

// ── MEZCLA DJ ─────────────────────────────────────────────────────────────
function djMix(nextIdx){
  if(!songs[nextIdx]||mixing)return;
  mixing=true;
  clearInterval(progressInterval);
  var slot=nextSlot;
  var pl=players[slot];
  coroFlags[slot]=false;
  pl.setVolume(0);
  pl.loadVideoById({videoId:songs[nextIdx].videoId});
  if(optJingleEnMezcla){
    playJingle(function(){if(songs[nextIdx])speakTitle(songs[nextIdx].title,null);});
  }
  var waited=0;
  var waitIv=setInterval(function(){
    waited++;
    try{
      var state=pl.getPlayerState();
      if(state===1||state===3){
        clearInterval(waitIv);
        seekToCoro(slot);
        currentIndex=nextIdx;
        document.getElementById('np-title').textContent=songs[nextIdx].title;
        renderQueue();
        var ms=Math.round(DJ_MIX_SECS*1000/MIX_STEPS);
        var step=0;
        var mixIv=setInterval(function(){
          step++;
          var pct=step/MIX_STEPS;
          try{players[active].setVolume(Math.max(0,Math.round(100*Math.pow(1-pct,2))));}catch(e){}
          try{players[slot].setVolume(Math.min(100,Math.round(100*Math.pow(pct,0.5))));}catch(e){}
          if(step>=MIX_STEPS){
            clearInterval(mixIv);
            try{players[active].stopVideo();players[active].setVolume(100);}catch(e){}
            active=slot;nextSlot=active==='A'?'B':'A';
            mixing=false;startProgress();
          }
        },ms);
      }
    }catch(e){}
    if(waited>40){clearInterval(waitIv);mixing=false;playVideoAt(nextIdx);}
  },150);
}

// ── Transición ────────────────────────────────────────────────────────────
function transitionTo(nextIdx){
  if(!songs[nextIdx]||mixing)return;
  if(optCrossfade){
    djMix(nextIdx);
  } else {
    try{players[active].stopVideo();}catch(e){}
    clearInterval(progressInterval);
    playJingle(function(){speakTitle(songs[nextIdx]?songs[nextIdx].title:'',function(){playVideoAt(nextIdx);});});
  }
}

// ── Reproducir desde cero ─────────────────────────────────────────────────
function playVideoAt(i){
  if(!songs[i])return;
  try{players.A.stopVideo();players.A.setVolume(100);}catch(e){}
  try{players.B.stopVideo();players.B.setVolume(100);}catch(e){}
  mixing=false;coroFlags.A=false;coroFlags.B=false;
  active='A';nextSlot='B';
  currentIndex=i;
  document.getElementById('np-title').textContent=songs[i].title;
  clearInterval(progressInterval);
  document.getElementById('progress-fill').style.width='0%';
  if(ready.A){players.A.setVolume(0);players.A.loadVideoById({videoId:songs[i].videoId});fadeVol('A','up',20,100,null);}
  renderQueue();
}

function pauseVideo(){try{players[active].pauseVideo();}catch(e){}}
function resumeVideo(){try{players[active].playVideo();}catch(e){}}
function setVolume(v){try{players[active].setVolume(parseInt(v));}catch(e){}}

// ── Comandos desde Supabase ───────────────────────────────────────────────
var lastCmd='';
function applyState(st){
  if(!st)return;
  if(!ready.A||!ready.B){pendingState=st;return;}
  var cmd=st.command||'',idx=st.current_index!==null?st.current_index:-1,vol=st.volume!==undefined?st.volume:100,cmdId=st.command_id||'';
  if(st.opt_crossfade!==undefined)optCrossfade=!!st.opt_crossfade;
  if(st.opt_jingle!==undefined)optJingle=!!st.opt_jingle;
  if(st.opt_locutor!==undefined)optLocutor=!!st.opt_locutor;
  if(st.opt_jingle_en_mezcla!==undefined)optJingleEnMezcla=!!st.opt_jingle_en_mezcla;
  if(st.custom_jingle_url!==undefined)customJingleUrl=st.custom_jingle_url||null;
  if(st.custom_locutor_url!==undefined)customLocutorUrl=st.custom_locutor_url||null;
  if(cmdId&&cmdId===lastCmd)return;
  lastCmd=cmdId;
  if(cmd==='play'){
    if(idx>=0&&idx<songs.length){if(idx!==currentIndex){if(currentIndex>=0)transitionTo(idx);else playVideoAt(idx);}else resumeVideo();}
    else if(songs.length>0&&currentIndex===-1)playVideoAt(0);
  } else if(cmd==='pause'){pauseVideo();}
  else if(cmd==='next'){var n=(currentIndex>=0?currentIndex:-1)+1;if(n<songs.length)transitionTo(n);else{try{players[active].stopVideo();}catch(e){}currentIndex=-1;renderQueue();document.getElementById('np-title').textContent='Sin mas canciones';}}
  else if(cmd==='volume'){setVolume(vol);}
  else if(cmd==='stop'){
    mixing=true;fadeVol(active,'down',15,100,function(){try{players.A.stopVideo();players.B.stopVideo();}catch(e){}mixing=false;});
    clearInterval(progressInterval);currentIndex=-1;renderQueue();document.getElementById('np-title').textContent='Esperando canciones...';
  }
}

// ── YouTube API ───────────────────────────────────────────────────────────
function loadYouTubeAPI(){var s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);}

function makePlayer(divId,key){
  return new YT.Player(divId,{height:'1',width:'1',playerVars:{autoplay:0,controls:0},events:{
    onReady:function(){ready[key]=true;},
    onError:function(){
      if(key!==active)return;
      clearInterval(progressInterval);
      var n=currentIndex+1;
      if(n<songs.length){mixing=false;playVideoAt(n);}
      else{document.getElementById('np-title').textContent='Sin mas canciones';currentIndex=-1;renderQueue();}
    },
    onStateChange:function(e){
      if(key!==active){if(e.data===YT.PlayerState.PLAYING)seekToCoro(key);return;}
      if(e.data===YT.PlayerState.PLAYING){seekToCoro(key);startProgress();}
      if(e.data===YT.PlayerState.PAUSED)clearInterval(progressInterval);
      if(e.data===YT.PlayerState.ENDED){
        clearInterval(progressInterval);
        if(!mixing&&currentIndex<songs.length-1)transitionTo(currentIndex+1);
        else if(!mixing){document.getElementById('np-title').textContent='Sin mas canciones';currentIndex=-1;renderQueue();}
      }
    }
  }});
}

window.onYouTubeIframeAPIReady=function(){
  players.A=makePlayer('yt-player-a','A');
  players.B=makePlayer('yt-player-b','B');
  var waitPlayers=setInterval(function(){
    if(ready.A&&ready.B){
      clearInterval(waitPlayers);
      if(pendingState){var st=pendingState;pendingState=null;lastCmd='';applyState(st);}
    }
  },200);
};

function startProgress(){
  clearInterval(progressInterval);
  progressInterval=setInterval(function(){
    var pl=players[active];if(!pl||!pl.getDuration)return;
    try{
      var dur=pl.getDuration(),cur=pl.getCurrentTime();
      if(dur>0){
        document.getElementById('progress-fill').style.width=(cur/dur*100)+'%';
        if(dur-cur<DJ_MIX_SECS+1&&!mixing&&currentIndex<songs.length-1)transitionTo(currentIndex+1);
      }
    }catch(e){}
  },500);
}

// ── Realtime ──────────────────────────────────────────────────────────────
function connectRealtime(){
  var dot=document.getElementById('conn-dot');
  sb.channel('state-ch').on('postgres_changes',{event:'*',schema:'public',table:'state',filter:'school_id=eq.'+schoolId},function(p){dot.className='ok';applyState(p.new);}).subscribe(function(s){if(s==='SUBSCRIBED')dot.className='ok';if(s==='CLOSED'||s==='CHANNEL_ERROR')dot.className='err';});
  sb.channel('songs-ch').on('postgres_changes',{event:'*',schema:'public',table:'songs',filter:'school_id=eq.'+schoolId},function(){loadSongs();}).subscribe();
  sb.channel('msgs-ch').on('postgres_changes',{event:'*',schema:'public',table:'messages',filter:'school_id=eq.'+schoolId},function(){loadMessages();}).subscribe();
}

function loadSongs(){sbFetch('songs?select=*&order=created_at&school_id=eq.'+schoolId).then(function(s){if(Array.isArray(s)){songs=s;renderQueue();}}).catch(function(){});}
function loadMessages(){sbFetch('messages?select=*&order=created_at&school_id=eq.'+schoolId).then(function(m){if(Array.isArray(m)){messages=m;renderMessages();}}).catch(function(){});}

function getSchoolId(){return new URLSearchParams(window.location.search).get('school')||'';}

function initApp(){
  schoolId=getSchoolId();
  if(!schoolId){showError();return;}
  sbFetch('schools?id=eq.'+schoolId+'&select=*').then(function(data){
    if(!Array.isArray(data)||!data[0]){showError();return;}
    school=data[0];applySchool();loadYouTubeAPI();
    Promise.all([
      sbFetch('songs?select=*&order=created_at&school_id=eq.'+schoolId),
      sbFetch('messages?select=*&order=created_at&school_id=eq.'+schoolId),
      sbFetch('state?select=*&school_id=eq.'+schoolId)
    ]).then(function(results){
      if(Array.isArray(results[0])){songs=results[0];renderQueue();}
      if(Array.isArray(results[1])){messages=results[1];renderMessages();}
      if(Array.isArray(results[2])&&results[2][0]){pendingState=results[2][0];}
    }).catch(function(){});
    connectRealtime();
    setInterval(function(){loadSongs();loadMessages();},2000);
  }).catch(showError);
}

function applySchool(){
  document.getElementById('loading').style.display='none';
  document.getElementById('app-header').style.display='flex';
  document.getElementById('app-player').style.display='block';
  document.getElementById('app-content').style.display='block';
  var nameEl=document.getElementById('school-city-h');
  if(nameEl){nameEl.textContent=school.name+(school.city?' — '+school.city:'');}
  document.getElementById('app-footer').textContent=school.name.toUpperCase()+(school.city?' — '+school.city.toUpperCase():'');
  document.title='Radio — '+school.name;
  if(school.color){
    document.documentElement.style.setProperty('--neon-pink',school.color);
    document.documentElement.style.setProperty('--accent',school.color);
  }
}
function showError(){document.getElementById('loading').style.display='none';document.getElementById('error-screen').style.display='flex';}

// ── Búsqueda ──────────────────────────────────────────────────────────────
var searchDebounce;
function triggerSearch(){
  clearTimeout(searchDebounce);
  var q=document.getElementById('search-input').value.trim(),res=document.getElementById('results');
  if(q.length<2){res.style.display='none';res.innerHTML='';return;}
  res.style.display='block';res.innerHTML='<div class="search-loading">Buscando...</div>';
  doSearch(q);
}
var _si=document.getElementById('search-input');
if(_si){
  _si.addEventListener('keydown',function(e){if(e.key==='Enter'){clearTimeout(searchDebounce);triggerSearch();}});
  _si.addEventListener('input',function(){
    var v=this.value.trim(),r=document.getElementById('results');
    clearTimeout(searchDebounce);
    if(v.length<2){r.style.display='none';r.innerHTML='';return;}
    searchDebounce=setTimeout(function(){triggerSearch();},450);
  });
}

function doSearch(q){
  var res=document.getElementById('results');
  fetch('https://kara-search.brauzamorar.workers.dev?q='+encodeURIComponent(q)+'&type=video')
    .then(function(r){return r.json();})
    .then(function(data){
      if(!Array.isArray(data)||!data.length){res.innerHTML='<div class="search-loading">Sin resultados</div>';return;}
      var html='';
      data.slice(0,6).forEach(function(item){
        var vid=item.videoId;
        var thumb='https://img.youtube.com/vi/'+vid+'/mqdefault.jpg';
        html+='<div class="result-item" data-vid="'+vid+'" data-title="'+item.title.replace(/"/g,'&quot;')+'">';
        html+='<img src="'+thumb+'" style="width:40px;height:30px;object-fit:cover;border-radius:4px;flex-shrink:0;">';
        html+='<div style="flex:1;overflow:hidden"><div style="font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+item.title+'</div>';
        html+='<div style="font-size:.72rem;color:var(--muted)">'+(item.author||'')+'</div></div>';
        html+='<button class="add-btn">+ Agregar</button></div>';
      });
      res.innerHTML=html;
      res.onclick=function(e){var row=e.target.closest('.result-item');if(!row)return;addSong(row.dataset.vid,row.dataset.title);};
    })
    .catch(function(){res.innerHTML='<div class="search-loading">Error al buscar</div>';});
}

function addSong(videoId,title){
  document.getElementById('results').style.display='none';document.getElementById('search-input').value='';
  sbFetch('songs',{method:'POST',prefer:'return=representation',body:[{title:title,videoId:videoId,school_id:schoolId}]}).then(function(res){if(Array.isArray(res)&&res[0])showToast();}).catch(function(){});
}
function showToast(){var t=document.getElementById('toast');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

function sendMsg(){var inp=document.getElementById('msg-input'),text=inp.value.trim();if(!text)return;inp.value='';sbFetch('messages',{method:'POST',prefer:'return=representation',body:[{text:text,school_id:schoolId}]}).catch(function(){});}
var _mi=document.getElementById('msg-input');
if(_mi)_mi.addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});

function renderQueue(){
  var el=document.getElementById('queue-list');
  if(!songs.length){el.innerHTML='<div class="queue-empty">Sin canciones aún...</div>';return;}
  var html='';
  songs.forEach(function(s,i){
    var playing=(currentIndex>=0&&i===currentIndex);
    html+='<div class="queue-item'+(playing?' playing':'')+'"><div class="queue-num">';
    if(playing)html+='<span class="bar"></span><span class="bar"></span><span class="bar"></span>';
    else html+=(i+1);
    html+='</div><div class="queue-title">'+s.title+'</div></div>';
  });
  el.innerHTML=html;
}

function renderMessages(){
  var el=document.getElementById('msg-list');
  if(!messages.length){el.innerHTML='<div class="msg-empty">Sé el primero en dejar un saludo</div>';return;}
  var html='';messages.slice().reverse().forEach(function(m){
    var time=m.created_at?new Date(m.created_at).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}):'';
    html+='<div class="msg-item"><span>💬</span><div><div class="msg-text">'+m.text+'</div><div class="msg-time">'+time+'</div></div></div>';
  });
  el.innerHTML=html;
}

document.addEventListener('click',function(e){if(!e.target.closest('.search-wrap')&&!e.target.closest('#results'))document.getElementById('results').style.display='none';});
initApp();
</script>
