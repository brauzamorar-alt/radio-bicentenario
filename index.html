<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Radio Escolar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06040f;--neon-pink:#ff2d9b;--neon-blue:#00d4ff;--neon-purple:#b44fff;
  --neon-green:#22c55e;--neon-yellow:#ffe600;
  --surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--text:#f5f0ff;--muted:rgba(255,255,255,0.35);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 40% at 20% 0%,rgba(180,79,255,0.15) 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 80% 10%,rgba(0,212,255,0.1) 0%,transparent 60%);}

/* Header */
header{background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(180,79,255,0.2);
  padding:14px 16px;display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);position:relative;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;}
.logo .r{color:#fff;text-shadow:0 0 10px rgba(255,45,155,0.8);}
.logo .d{color:var(--neon-purple);margin:0 3px;}
.logo .e{color:var(--neon-blue);text-shadow:0 0 10px rgba(0,212,255,0.8);}
.logo-sub{font-size:.68rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.live-badge{margin-left:auto;display:flex;align-items:center;gap:6px;
  background:rgba(255,45,155,0.08);border:1px solid rgba(255,45,155,0.3);
  border-radius:20px;padding:5px 12px;font-size:.72rem;font-weight:600;
  color:var(--neon-pink);letter-spacing:1px;}
.live-dot{width:7px;height:7px;background:var(--neon-pink);border-radius:50%;
  box-shadow:0 0 6px var(--neon-pink);animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.5);opacity:.4}}

/* Player */
.player-section{background:linear-gradient(135deg,rgba(180,79,255,0.1),rgba(0,212,255,0.06));
  border-bottom:1px solid rgba(180,79,255,0.2);padding:14px 16px;
  position:relative;overflow:hidden;z-index:1;}
.player-section::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--neon-pink),var(--neon-purple),var(--neon-blue));}
.np-label{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--neon-purple);margin-bottom:6px;font-weight:600;}
.np-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:1.5rem;}
.progress-bar{height:4px;background:rgba(255,255,255,0.08);border-radius:4px;margin-top:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--neon-pink),var(--neon-purple));
  border-radius:4px;width:0%;transition:width .5s linear;}

/* Sections */
.section{padding:16px 16px 0;position:relative;z-index:1;}
.sec-title{font-size:.65rem;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:600;}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.08),transparent);}

/* Search */
.search-wrap{position:relative;}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid rgba(180,79,255,0.2);
  border-radius:12px;padding:11px 80px 11px 14px;color:var(--text);
  font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:rgba(180,79,255,0.5);}
.search-wrap input::placeholder{color:var(--muted);}
.search-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);
  background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));
  border:none;border-radius:8px;color:#fff;font-size:.78rem;font-weight:600;
  padding:6px 12px;cursor:pointer;font-family:'Outfit',sans-serif;}
#results{background:rgba(10,6,20,0.97);border:1px solid rgba(180,79,255,0.2);
  border-radius:12px;margin-top:6px;overflow:hidden;display:none;}
.result-item{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.05);
  display:flex;align-items:center;gap:10px;transition:background .15s;cursor:pointer;}
.result-item:last-child{border-bottom:none;}
.result-item:active{background:rgba(180,79,255,0.1);}
.add-btn{margin-left:auto;background:linear-gradient(135deg,rgba(255,45,155,0.2),rgba(180,79,255,0.2));
  border:1px solid rgba(255,45,155,0.4);border-radius:6px;color:var(--neon-pink);
  font-size:.75rem;padding:5px 10px;cursor:pointer;font-weight:600;white-space:nowrap;
  font-family:'Outfit',sans-serif;}
.search-hint{padding:12px 14px;color:var(--muted);font-size:.85rem;}

/* Queue */
#queue-list{display:flex;flex-direction:column;gap:6px;}
.queue-item{background:var(--surface2);border:1px solid var(--border);
  border-radius:11px;padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:.88rem;}
.queue-item.playing{border-color:rgba(255,45,155,0.4);background:rgba(255,45,155,0.06);}
.q-num{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--muted);min-width:20px;}
.queue-item.playing .q-num{color:var(--neon-pink);}
.bar{width:3px;background:var(--neon-pink);border-radius:2px;
  animation:bars .7s infinite alternate;display:inline-block;margin:0 1px;}
.bar:nth-child(2){animation-delay:.15s;background:var(--neon-purple);}
.bar:nth-child(3){animation-delay:.3s;background:var(--neon-blue);}
@keyframes bars{from{height:4px}to{height:14px}}
.q-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.queue-empty{text-align:center;color:var(--muted);font-size:.85rem;padding:20px;}

/* Messages */
.msg-wrap{display:flex;gap:8px;margin-bottom:10px;}
.msg-wrap input{flex:1;background:var(--surface2);border:1px solid rgba(0,212,255,0.2);
  border-radius:11px;padding:10px 14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.88rem;outline:none;}
.msg-wrap input::placeholder{color:var(--muted);}
.msg-send{background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));
  border:none;border-radius:11px;padding:10px 16px;color:#fff;font-weight:700;
  font-size:.85rem;cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif;}
#msg-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;}
.msg-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:9px 14px;font-size:.88rem;display:flex;gap:8px;align-items:flex-start;}
.msg-text{flex:1;line-height:1.4;}
.msg-time{font-size:.7rem;color:var(--muted);margin-top:2px;}
.msg-empty{color:var(--muted);font-size:.85rem;text-align:center;padding:16px;}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  background:rgba(10,6,20,0.97);border:1px solid rgba(0,255,136,0.4);
  color:var(--neon-green);padding:10px 20px;border-radius:20px;font-size:.85rem;
  font-weight:600;transition:transform .3s ease;z-index:999;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* Locutor */
#locutor-banner{display:none;position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  background:rgba(10,6,20,0.97);border:1px solid rgba(255,230,0,0.4);
  border-radius:20px;padding:8px 18px;font-size:.8rem;color:var(--neon-yellow);
  z-index:998;pointer-events:none;white-space:nowrap;}
#locutor-banner.show{display:block;}

footer{margin-top:auto;text-align:center;padding:10px;font-size:.68rem;
  color:rgba(255,255,255,0.1);letter-spacing:2px;position:relative;z-index:1;padding-bottom:20px;}
#yt-player{position:absolute;top:-9999px;left:-9999px;width:1px;height:1px;}
</style>
</head>
<body>
<div id="yt-player-a"></div>
<div id="yt-player-b"></div>
<div id="locutor-banner">🎙️ <span id="locutor-text"></span></div>

<header>
  <div>
    <div class="logo"><span class="r">RADIO</span><span class="d">—</span><span class="e">ESCOLAR</span></div>
    <div class="logo-sub" id="school-sub">Cargando...</div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>EN VIVO</div>
</header>

<div class="player-section">
  <div class="np-label">Reproduciendo ahora</div>
  <div class="np-title" id="np-title">Esperando canciones...</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div class="section">
  <div class="sec-title">🎵 Pedir canción</div>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Busca un tema, artista..." autocomplete="off">
    <button class="search-btn" onclick="triggerSearch()">Buscar</button>
  </div>
  <div id="results"></div>
</div>

<div class="section">
  <div class="sec-title">🎤 Lista de reproducción</div>
  <div id="queue-list"><div class="queue-empty">Sin canciones aún...</div></div>
</div>

<div class="section" style="padding-bottom:20px;">
  <div class="sec-title">💬 Saludos y mensajes</div>
  <div class="msg-wrap">
    <input type="text" id="msg-input" placeholder="Feliz cumple, saludos..." maxlength="120">
    <button class="msg-send" onclick="sendMsg()">Enviar</button>
  </div>
  <div id="msg-list"><div class="msg-empty">Sin mensajes aún...</div></div>
</div>

<footer id="app-footer">RADIO ESCOLAR</footer>
<div class="toast" id="toast">Canción agregada ✓</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SB_URL='https://dyyftbaniffvyeqmnayh.supabase.co';
var SB_KEY='sb_publishable_zeq17EOddIPy9r_8KdeLNg_ZDyTGOmU';
var SCHOOL_ID=new URLSearchParams(window.location.search).get('school')||'bicentenario';
var songs=[],messages=[],currentIndex=-1;
// ── Dos players para crossfade DJ real ───────────────────────────────────
var players={A:null,B:null},ready={A:false,B:false};
var active='A',next='B';
var progressInterval=null,coroFlags={A:false,B:false},mixing=false;
var crossfading_enabled=true,locutor_enabled=true;
var locutor_url=null; // URL de audio personalizado para locutor
var CROSSFADE_SECS=6, MIX_MS=5000; // 5 segundos de mezcla

function sbFetch(path,opts){
  var h={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
  if(opts&&opts.prefer)h['Prefer']=opts.prefer;
  return fetch(SB_URL+'/rest/v1/'+path,{
    method:opts&&opts.method||'GET',headers:h,
    body:opts&&opts.body?JSON.stringify(opts.body):undefined
  }).then(function(r){return r.status===204?{}:r.json();});
}

// ── Locutor con soporte de audio personalizado ───────────────────────────
function speakTitle(title,onEnd){
  if(!locutor_enabled){if(onEnd)onEnd();return;}
  var clean=title.replace(/\(.*?\)/g,'').replace(/\[.*?\]/g,'')
    .replace(/official|video|lyrics|hd|4k|karaoke/gi,'').replace(/\s+/g,' ').trim().substring(0,60);
  document.getElementById('locutor-text').textContent='🎵 '+clean;
  document.getElementById('locutor-banner').classList.add('show');
  setTimeout(function(){document.getElementById('locutor-banner').classList.remove('show');},4000);
  // Si hay URL de audio personalizado, usarlo
  if(locutor_url){
    try{
      var a=new Audio(locutor_url);
      a.volume=0.9;
      a.play().catch(function(){if(onEnd)onEnd();});
      a.onended=function(){if(onEnd)onEnd();};
      a.onerror=function(){if(onEnd)onEnd();};
      return;
    }catch(e){}
  }
  // Fallback: TTS del navegador
  if(window.speechSynthesis){
    var u=new SpeechSynthesisUtterance('Ahora suena: '+clean);
    u.lang='es-CL';u.rate=0.95;u.pitch=1.05;u.volume=0.9;
    u.onend=u.onerror=function(){if(onEnd)onEnd();};
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } else {if(onEnd)onEnd();}
}

// ── Dos players YouTube ──────────────────────────────────────────────────
function makePlayer(divId,key){
  return new YT.Player(divId,{
    height:'1',width:'1',
    playerVars:{autoplay:0,controls:0},
    events:{
      onReady:function(){
        ready[key]=true;
        if(key==='A'&&songs.length&&currentIndex===-1)playIndex(0);
      },
      onStateChange:function(e){
        if(e.data===YT.PlayerState.PLAYING){
          // Seek al 50% para saltar publicidad mid-roll
          if(!coroFlags[key]){
            try{
              var dur=players[key].getDuration();
              if(dur>60){coroFlags[key]=true;players[key].seekTo(Math.floor(dur*0.5),true);}
            }catch(ex){}
          }
          // Solo arrancar progress desde el player activo
          if(key===active) startProgress();
        }
        if(e.data===YT.PlayerState.ENDED){
          if(key===active&&!mixing) onSongEnd();
        }
      },
      onError:function(){
        if(key===active&&currentIndex<songs.length-1) playIndex(currentIndex+1);
      }
    }
  });
}

window.onYouTubeIframeAPIReady=function(){
  players.A=makePlayer('yt-player-a','A');
  players.B=makePlayer('yt-player-b','B');
};

function loadYouTubeAPI(){
  var s=document.createElement('script');
  s.src='https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
}

// ── Mezcla DJ real con dos players ───────────────────────────────────────
function djMix(nextIdx){
  if(!songs[nextIdx]||mixing)return;
  mixing=true;
  clearInterval(progressInterval);
  var slot=next; // player que va a entrar
  coroFlags[slot]=false;
  // Cargar el siguiente en el player inactivo con volumen 0
  players[slot].setVolume(0);
  players[slot].loadVideoById({videoId:songs[nextIdx].videoId});
  // Locutor mientras el siguiente carga
  speakTitle(songs[nextIdx].title,null);
  // Esperar que el siguiente empiece a reproducir
  var waited=0;
  var waitIv=setInterval(function(){
    waited++;
    try{
      var state=players[slot].getPlayerState();
      if(state===1||state===3){ // PLAYING o BUFFERING
        clearInterval(waitIv);
        // Actualizar info
        currentIndex=nextIdx;
        document.getElementById('np-title').textContent=songs[nextIdx].title;
        renderQueue();
        // CROSSFADE: bajar activo y subir entrante simultáneamente en MIX_MS ms
        var steps=0,totalSteps=25;
        var mixIv=setInterval(function(){
          steps++;
          var pct=steps/totalSteps;
          var volOut=Math.max(0,Math.round(100*(1-pct)));
          var volIn=Math.min(100,Math.round(100*pct));
          try{players[active].setVolume(volOut);}catch(ex){}
          try{players[slot].setVolume(volIn);}catch(ex){}
          if(steps>=totalSteps){
            clearInterval(mixIv);
            try{players[active].stopVideo();players[active].setVolume(100);}catch(ex){}
            active=slot;
            next=active==='A'?'B':'A';
            mixing=false;
            startProgress();
          }
        },Math.round(MIX_MS/totalSteps));
      }
    }catch(ex){}
    if(waited>40){clearInterval(waitIv);mixing=false;playIndex(nextIdx);}
  },150);
}

function startProgress(){
  clearInterval(progressInterval);
  progressInterval=setInterval(function(){
    var pl=players[active];
    if(!pl||!pl.getDuration)return;
    try{
      var dur=pl.getDuration(),cur=pl.getCurrentTime();
      if(dur>0){
        document.getElementById('progress-fill').style.width=(cur/dur*100)+'%';
        if(dur-cur<CROSSFADE_SECS&&!mixing&&currentIndex<songs.length-1){
          if(crossfading_enabled) djMix(currentIndex+1);
          else doTransitionSimple(currentIndex+1);
        }
      }
    }catch(e){}
  },500);
}

function doTransitionSimple(nextIdx){
  if(!songs[nextIdx]||mixing)return;
  mixing=true;clearInterval(progressInterval);
  try{players[active].stopVideo();}catch(ex){}
  speakTitle(songs[nextIdx].title,function(){playIndex(nextIdx);});
}

function onSongEnd(){
  clearInterval(progressInterval);
  document.getElementById('progress-fill').style.width='0%';
  if(!mixing){
    if(currentIndex<songs.length-1){
      if(crossfading_enabled) djMix(currentIndex+1);
      else doTransitionSimple(currentIndex+1);
    } else {
      document.getElementById('np-title').textContent='Sin más canciones';
      currentIndex=-1;renderQueue();
    }
  }
  mixing=false;
}

function playIndex(i){
  if(!songs[i]||!ready.A)return;
  window.speechSynthesis&&window.speechSynthesis.cancel();
  coroFlags.A=false;coroFlags.B=false;
  mixing=false;
  active='A';next='B';
  currentIndex=i;
  clearInterval(progressInterval);
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('np-title').textContent=songs[i].title;
  players.A.setVolume(100);
  players.A.loadVideoById({videoId:songs[i].videoId});
  renderQueue();
  sbFetch('state?on_conflict=id',{method:'POST',prefer:'resolution=merge-duplicates',
    body:[{id:1,current_index:i,current_title:songs[i].title,school_id:SCHOOL_ID}]}).catch(function(){});
}

// ── Búsqueda ──────────────────────────────────────────────────────────────
var searchDebounce;
function triggerSearch(){
  clearTimeout(searchDebounce);
  var q=document.getElementById('search-input').value.trim();
  var res=document.getElementById('results');
  if(q.length<2){res.style.display='none';res.innerHTML='';return;}
  res.style.display='block';
  res.innerHTML='<div class="search-hint">Buscando...</div>';
  doSearch(q);
}
// Search listeners moved to init()

function renderResults(data){
  var res=document.getElementById('results');
  if(!Array.isArray(data)||!data.length){res.innerHTML='<div class="search-hint">Sin resultados</div>';return;}
  var html='';
  data.slice(0,6).forEach(function(item){
    var vid=item.videoId||item.id&&item.id.videoId;
    var title=item.title||item.snippet&&item.snippet.title||'';
    var author=item.author||item.snippet&&item.snippet.channelTitle||'';
    var thumb='https://img.youtube.com/vi/'+vid+'/mqdefault.jpg';
    html+='<div class="result-item" data-vid="'+vid+'" data-title="'+title.replace(/"/g,'&quot;')+'">';
    html+='<img src="'+thumb+'" style="width:40px;height:30px;object-fit:cover;border-radius:4px;flex-shrink:0;">';
    html+='<div style="flex:1;overflow:hidden"><div style="font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+title+'</div>';
    html+='<div style="font-size:.72rem;color:var(--muted)">'+author+'</div></div>';
    html+='<button class="add-btn">+ Agregar</button></div>';
  });
  res.innerHTML=html;
  res.onclick=function(e){
    var row=e.target.closest('.result-item');if(!row)return;
    addSong(row.dataset.vid,row.dataset.title);
  };
}

function doSearch(q){
  var res=document.getElementById('results');
  // Primero intentar Cloudflare Worker
  fetch('https://kara-search.brauzamorar.workers.dev?q='+encodeURIComponent(q)+'&type=video')
    .then(function(r){
      if(!r.ok)throw new Error('worker error');
      return r.json();
    })
    .then(function(data){
      if(!Array.isArray(data)||!data.length) throw new Error('no results');
      renderResults(data);
    })
    .catch(function(){
      // Fallback: YouTube Data API
      var YT_KEY='AIzaSyDq6GTi3IotPnwWPuFCjxJGdxJPmVjhgnQ';
      fetch('https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=6&q='+encodeURIComponent(q)+'&key='+YT_KEY)
        .then(function(r){return r.json();})
        .then(function(data){
          if(!data.items||!data.items.length){res.innerHTML='<div class="search-hint">Sin resultados</div>';return;}
          renderResults(data.items);
        })
        .catch(function(){res.innerHTML='<div class="search-hint">Error al buscar</div>';});
    });
}

function addSong(videoId,title){
  document.getElementById('results').style.display='none';
  document.getElementById('search-input').value='';
  sbFetch('songs',{method:'POST',prefer:'return=representation',
    body:[{title:title,videoId:videoId,school_id:SCHOOL_ID}]})
    .then(function(res){if(Array.isArray(res)&&res[0]){showToast();loadData();}})
    .catch(function(){});
}

function showToast(){
  var t=document.getElementById('toast');t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

function sendMsg(){
  var inp=document.getElementById('msg-input'),text=inp.value.trim();
  if(!text)return;inp.value='';
  sbFetch('messages',{method:'POST',prefer:'return=representation',
    body:[{text:text,school_id:SCHOOL_ID}]}).then(function(){loadData();}).catch(function(){});
}


function renderQueue(){
  var el=document.getElementById('queue-list');
  if(!songs.length){el.innerHTML='<div class="queue-empty">Sin canciones aún...</div>';return;}
  var html='';
  songs.forEach(function(s,i){
    var playing=(i===currentIndex);
    html+='<div class="queue-item'+(playing?' playing':'')+'"><div class="q-num">';
    if(playing)html+='<span class="bar"></span><span class="bar"></span><span class="bar"></span>';
    else html+=(i+1);
    html+='</div><div class="q-title">'+s.title+'</div></div>';
  });
  el.innerHTML=html;
}

function renderMessages(){
  var el=document.getElementById('msg-list');
  if(!messages.length){el.innerHTML='<div class="msg-empty">Sé el primero en dejar un saludo</div>';return;}
  var html='';
  messages.slice().reverse().forEach(function(m){
    var time=m.created_at?new Date(m.created_at).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}):'';
    html+='<div class="msg-item"><span>💬</span><div><div class="msg-text">'+m.text+'</div><div class="msg-time">'+time+'</div></div></div>';
  });
  el.innerHTML=html;
}

// ── Realtime commands desde admin ─────────────────────────────────────────
var lastCmdId='';
function applyCommand(st){
  if(!st)return;
  // Apply options regardless of command
  if(st.opt_crossfade!==undefined)crossfading_enabled=!!st.opt_crossfade;
  if(st.opt_locutor!==undefined)locutor_enabled=!!st.opt_locutor;
  if(st.locutor_url!==undefined)locutor_url=st.locutor_url||null;
  var cmd=st.command||'',cmdId=st.command_id||'';
  if(cmdId&&cmdId===lastCmdId)return;
  lastCmdId=cmdId;
  var idx=st.current_index!==undefined?st.current_index:-1;
  if(cmd==='play'){
    if(idx>=0&&idx<songs.length&&idx!==currentIndex)playIndex(idx);
    else if(idx>=0&&idx<songs.length){try{players[active].playVideo();}catch(e){}}
    else if(songs.length&&currentIndex===-1)playIndex(0);
  } else if(cmd==='pause'){
    try{players[active].pauseVideo();}catch(e){}
  } else if(cmd==='next'){
    var n=currentIndex+1;
    if(n<songs.length){mixing=false;if(crossfading_enabled)djMix(n);else doTransitionSimple(n);}
  } else if(cmd==='stop'){
    try{players[active].stopVideo();}catch(e){}
    clearInterval(progressInterval);
    document.getElementById('progress-fill').style.width='0%';
    document.getElementById('np-title').textContent='Radio pausada';
    currentIndex=-1;renderQueue();
  } else if(cmd==='volume'){
    try{players[active].setVolume(st.volume||100);}catch(e){}
  }
}

// ── Carga de datos ────────────────────────────────────────────────────────
function loadData(){
  sbFetch('songs?select=*&order=created_at&school_id=eq.'+SCHOOL_ID).then(function(data){
    if(Array.isArray(data)){songs=data;renderQueue();}
  }).catch(function(){});
  sbFetch('messages?select=*&order=created_at&school_id=eq.'+SCHOOL_ID).then(function(data){
    if(Array.isArray(data)){messages=data;renderMessages();}
  }).catch(function(){});
  sbFetch('state?select=*&school_id=eq.'+SCHOOL_ID+'&limit=1').then(function(data){
    if(Array.isArray(data)&&data[0]){applyCommand(data[0]);}
  }).catch(function(){});
}

// ── Supabase Realtime ─────────────────────────────────────────────────────
function connectRealtime(){
  var sb=supabase.createClient(SB_URL,SB_KEY);
  sb.channel('radio-'+SCHOOL_ID)
    .on('postgres_changes',{event:'*',schema:'public',table:'songs',filter:'school_id=eq.'+SCHOOL_ID},function(){loadData();})
    .on('postgres_changes',{event:'*',schema:'public',table:'messages',filter:'school_id=eq.'+SCHOOL_ID},function(){loadData();})
    .on('postgres_changes',{event:'*',schema:'public',table:'state',filter:'school_id=eq.'+SCHOOL_ID},function(p){
      if(p.new)applyCommand(p.new);
    })
    .subscribe();
}

// ── Init ──────────────────────────────────────────────────────────────────
function init(){
  sbFetch('schools?id=eq.'+SCHOOL_ID+'&select=*').then(function(data){
    if(Array.isArray(data)&&data[0]){
      var s=data[0];
      document.getElementById('school-sub').textContent=s.name+(s.city?' — '+s.city:'');
      document.getElementById('app-footer').textContent=s.name.toUpperCase();
      document.title='Radio — '+s.name;
      if(s.color){document.documentElement.style.setProperty('--neon-pink',s.color);}
    }
  }).catch(function(){});
  loadData();
  connectRealtime();
  setInterval(loadData,5000);
  loadYouTubeAPI();
  // Search listeners
  var si=document.getElementById('search-input');
  if(si){
    si.addEventListener('keydown',function(e){if(e.key==='Enter'){clearTimeout(searchDebounce);triggerSearch();}});
    si.addEventListener('input',function(){
      var v=this.value.trim(),r=document.getElementById('results');
      clearTimeout(searchDebounce);
      if(v.length<2){r.style.display='none';r.innerHTML='';return;}
      searchDebounce=setTimeout(function(){triggerSearch();},450);
    });
  }
  var mi=document.getElementById('msg-input');
  if(mi) mi.addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});
}

document.addEventListener('click',function(e){
  if(!e.target.closest('.search-wrap')&&!e.target.closest('#results'))
    document.getElementById('results').style.display='none';
});

init();
</script>
