<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Radio Escolar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06040f;--neon-pink:#ff2d9b;--neon-blue:#00d4ff;--neon-purple:#b44fff;
  --neon-yellow:#ffe600;--neon-green:#22c55e;--accent:#ff2d9b;
  --surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08);--text:#f5f0ff;--muted:rgba(255,255,255,0.35);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 40% at 20% 0%,rgba(180,79,255,0.15) 0%,transparent 60%),
  radial-gradient(ellipse 60% 50% at 80% 10%,rgba(0,212,255,0.1) 0%,transparent 60%),
  radial-gradient(ellipse 50% 60% at 50% 100%,rgba(255,45,155,0.08) 0%,transparent 60%);}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px;}
#loading h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--text);letter-spacing:2px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--neon-purple);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
header{background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(180,79,255,0.2);padding:14px 16px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);position:relative;}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;}
.header-logo .r{color:#fff;text-shadow:0 0 10px rgba(255,45,155,0.8),0 0 30px rgba(255,45,155,0.4);}
.header-logo .dash{color:var(--neon-purple);margin:0 3px;}
.header-logo .e{color:var(--neon-blue);text-shadow:0 0 10px rgba(0,212,255,0.8);}
.header-sub{font-size:.68rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.live-badge{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(255,45,155,0.08);border:1px solid rgba(255,45,155,0.3);border-radius:20px;padding:5px 12px;font-size:.72rem;font-weight:600;color:var(--neon-pink);letter-spacing:1px;}
.live-dot{width:7px;height:7px;background:var(--neon-pink);border-radius:50%;box-shadow:0 0 6px var(--neon-pink);animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.5);opacity:.4}}
.player-section{background:linear-gradient(135deg,rgba(180,79,255,0.1),rgba(0,212,255,0.06));border-bottom:1px solid rgba(180,79,255,0.2);padding:14px 16px;position:relative;overflow:hidden;z-index:1;}
.player-section::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--neon-pink),var(--neon-purple),var(--neon-blue));}
.now-playing-label{font-size:.6rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--neon-purple);margin-bottom:6px;font-weight:600;}
.now-playing-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:1.5rem;}
.progress-bar{height:4px;background:rgba(255,255,255,0.08);border-radius:4px;margin-top:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--neon-pink),var(--neon-purple));border-radius:4px;width:0%;transition:width .5s linear;}
.section{padding:16px 16px 0;position:relative;z-index:1;}
.section-title{font-size:.65rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:600;}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.08),transparent);}
.search-wrap{position:relative;}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid rgba(180,79,255,0.2);border-radius:12px;padding:11px 80px 11px 40px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s;}
.search-wrap input:focus{border-color:rgba(180,79,255,0.5);box-shadow:0 0 0 3px rgba(180,79,255,0.08);}
.search-wrap input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);}
.search-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:linear-gradient(135deg,var(--neon-purple),var(--neon-pink));border:none;border-radius:8px;color:#fff;font-size:.78rem;font-weight:600;padding:6px 12px;cursor:pointer;font-family:'Outfit',sans-serif;}
#results{background:rgba(10,6,20,0.97);border:1px solid rgba(180,79,255,0.2);border-radius:12px;margin-top:6px;overflow:hidden;display:none;backdrop-filter:blur(20px);}
.result-item{padding:11px 14px;cursor:pointer;font-size:.88rem;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:10px;transition:background .15s;}
.result-item:last-child{border-bottom:none;}
.result-item:active{background:rgba(180,79,255,0.1);}
.add-btn{margin-left:auto;background:linear-gradient(135deg,rgba(255,45,155,0.2),rgba(180,79,255,0.2));border:1px solid rgba(255,45,155,0.4);border-radius:6px;color:var(--neon-pink);font-size:.75rem;padding:5px 10px;cursor:pointer;font-weight:600;white-space:nowrap;font-family:'Outfit',sans-serif;}
.search-loading{padding:12px 14px;color:var(--muted);font-size:.85rem;}
.added-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(10,6,20,0.97);border:1px solid rgba(0,255,136,0.4);color:var(--neon-green);padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:600;transition:transform .3s ease;z-index:999;pointer-events:none;}
.added-toast.show{transform:translateX(-50%) translateY(0);}
#queue-list{display:flex;flex-direction:column;gap:6px;}
.queue-item{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:.88rem;}
.queue-item.playing{border-color:rgba(255,45,155,0.4);background:rgba(255,45,155,0.06);}
.queue-num{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--muted);min-width:20px;}
.queue-item.playing .queue-num{color:var(--neon-pink);}
.bar{width:3px;background:var(--neon-pink);border-radius:2px;animation:bars .7s infinite alternate;display:inline-block;margin:0 1px;}
.bar:nth-child(2){animation-delay:.15s;background:var(--neon-purple);}
.bar:nth-child(3){animation-delay:.3s;background:var(--neon-blue);}
@keyframes bars{from{height:4px}to{height:14px}}
.queue-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.queue-empty{text-align:center;color:var(--muted);font-size:.85rem;padding:20px;}
.msg-input-wrap{display:flex;gap:8px;margin-bottom:10px;}
.msg-input-wrap input{flex:1;background:var(--surface2);border:1px solid rgba(0,212,255,0.2);border-radius:11px;padding:10px 14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.88rem;outline:none;}
.msg-input-wrap input::placeholder{color:var(--muted);}
.send-btn{background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple));border:none;border-radius:11px;padding:10px 16px;color:#fff;font-weight:700;font-size:.85rem;cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif;}
#msg-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;}
.msg-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 14px;font-size:.88rem;display:flex;gap:8px;align-items:flex-start;}
.msg-text{flex:1;line-height:1.4;}
.msg-time{font-size:.7rem;color:var(--muted);margin-top:2px;}
.msg-empty{color:var(--muted);font-size:.85rem;text-align:center;padding:16px;}
footer{margin-top:auto;text-align:center;padding:10px;font-size:.68rem;color:rgba(255,255,255,0.1);letter-spacing:2px;position:relative;z-index:1;}
#error-screen{display:none;position:fixed;inset:0;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:20px;z-index:999;}
#error-screen h2{font-family:'Bebas Neue',sans-serif;color:var(--neon-pink);}
#error-screen p{color:var(--muted);}
#locutor-banner{display:none;position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(10,6,20,0.97);border:1px solid rgba(255,230,0,0.4);border-radius:20px;padding:8px 18px;font-size:.8rem;color:var(--neon-yellow);z-index:998;pointer-events:none;white-space:nowrap;}
#locutor-banner.show{display:block;}
#yt-player,#yt-player-b{position:absolute;top:-9999px;left:-9999px;width:1px;height:1px;}
</style>
</head>
<body>
<div id="yt-player"></div>
<div id="yt-player-b"></div>
<div id="loading"><div class="spinner"></div><h2>Cargando radio...</h2></div>
<div id="error-screen"><h2>Colegio no encontrado</h2><p>Verifica la URL e intenta nuevamente.</p></div>
<div id="locutor-banner">🎙️ <span id="locutor-text"></span></div>

<header style="display:none" id="app-header">
  <div>
    <div class="header-logo"><span class="r">RADIO</span><span class="dash">—</span><span class="e">ESCOLAR</span></div>
    <div class="header-sub" id="school-city-h"></div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>EN VIVO</div>
</header>

<div class="player-section" style="display:none" id="app-player">
  <div class="now-playing-label">Reproduciendo ahora</div>
  <div class="now-playing-title" id="np-title">Esperando canciones...</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div id="app-content" style="display:none">
  <div class="section">
    <div class="section-title">🎵 Pedir canción</div>
    <div class="search-wrap">
      <span class="search-icon">🎵</span>
      <input type="text" id="search-input" placeholder="Busca un tema, artista..." autocomplete="off">
      <button class="search-btn" onclick="triggerSearch()">Buscar</button>
    </div>
    <div id="results"></div>
  </div>
  <div class="section">
    <div class="section-title">🎤 Lista de reproducción</div>
    <div id="queue-list"><div class="queue-empty">Sin canciones aún...</div></div>
  </div>
  <div class="section">
    <div class="section-title">💬 Saludos y mensajes</div>
    <div class="msg-input-wrap">
      <input type="text" id="msg-input" placeholder="Feliz cumple, saludos..." maxlength="120">
      <button class="send-btn" onclick="sendMsg()">Enviar</button>
    </div>
    <div id="msg-list"><div class="msg-empty">Sin mensajes aún...</div></div>
  </div>
  <footer id="app-footer">RADIO ESCOLAR</footer>
</div>
<div class="added-toast" id="toast">Canción agregada ✓</div>

<script>
var SB_URL = 'https://dyyftbaniffvyeqmnayh.supabase.co';
var SB_KEY = 'sb_publishable_zeq17EOddIPy9r_8KdeLNg_ZDyTGOmU';
var schoolId = '', school = null;
var songs = [], messages = [], currentIndex = -1;
var ytPlayer = null, ytPlayerB = null, ytReady = false, ytReadyB = false;
var activePlayer = 'A';
var progressInterval = null, crossfading = false, coroJumped = false;
var CROSSFADE_SECS = 6;

function sbFetch(path, opts) {
  var headers = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };
  if (opts && opts.prefer) headers['Prefer'] = opts.prefer;
  return fetch(SB_URL + '/rest/v1/' + path, {
    method: opts && opts.method ? opts.method : 'GET',
    headers: headers,
    body: opts && opts.body ? JSON.stringify(opts.body) : undefined
  }).then(function(r) { return r.json(); });
}

// ── Jingle ────────────────────────────────────────────────────────────────
function playJingle(type, onEnd) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var dur = 2.5, rate = ctx.sampleRate;
    var buf = ctx.createBuffer(1, rate * dur, rate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < data.length; i++) {
      var t = i / rate;
      var freq = 440 + 880 * (t / dur);
      data[i] = Math.sin(2 * Math.PI * freq * t) * Math.exp(-t * 1.2) * 0.18;
    }
    var src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start(0);
    src.onended = function() { ctx.close(); if (onEnd) onEnd(); };
  } catch(e) { if (onEnd) onEnd(); }
}

// ── Locutor ───────────────────────────────────────────────────────────────
function speakTitle(title, onEnd) {
  if (!window.speechSynthesis) { if (onEnd) onEnd(); return; }
  var clean = title.replace(/\(.*?\)/g,'').replace(/\[.*?\]/g,'')
    .replace(/official|video|lyrics|hd|4k|mv|ft\.|feat\./gi,'')
    .replace(/\s+/g,' ').trim().substring(0,60);
  var utter = new SpeechSynthesisUtterance('Ahora suena: ' + clean);
  utter.lang='es-CL'; utter.rate=0.95; utter.pitch=1.05; utter.volume=0.9;
  var banner = document.getElementById('locutor-banner');
  document.getElementById('locutor-text').textContent = '🎵 ' + clean;
  banner.classList.add('show');
  setTimeout(function(){ banner.classList.remove('show'); }, 4000);
  utter.onend = utter.onerror = function(){ if (onEnd) onEnd(); };
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
}

// ── Transición ────────────────────────────────────────────────────────────
function transitionToNext(nextIndex) {
  if (!songs[nextIndex]) return;
  var nextSong = songs[nextIndex];
  var pl = getActive();
  var steps = 0;
  var fadeOut = setInterval(function() {
    steps++;
    var v = Math.max(0, Math.round(100 * (1 - steps / 10)));
    try { if (pl) pl.setVolume(v); } catch(e) {}
    if (steps >= 10) {
      clearInterval(fadeOut);
      try { if (pl) pl.stopVideo(); } catch(e) {}
      playJingle('transition', function() {
        speakTitle(nextSong.title, function() {
          playIndex(nextIndex);
        });
      });
    }
  }, 200);
}

// ── YouTube ───────────────────────────────────────────────────────────────
function getActive() { return activePlayer === 'A' ? ytPlayer : ytPlayerB; }

function getSchoolId() { return new URLSearchParams(window.location.search).get('school') || ''; }

function loadYouTubeAPI() {
  var s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
}

// ── CLAVE: seekTo(60) en el primer evento PLAYING — igual que el original ─
window.onYouTubeIframeAPIReady = function() {
  ytPlayer = new YT.Player('yt-player', {
    height: '1', width: '1',
    playerVars: { autoplay: 0, controls: 0 },
    events: {
      onReady: function() { ytReady = true; },
      onStateChange: function(e) {
        if (activePlayer !== 'A') return;
        if (e.data === YT.PlayerState.ENDED) onSongEnd();
        if (e.data === YT.PlayerState.PLAYING) {
          if (!coroJumped) { coroJumped = true; ytPlayer.seekTo(60, true); }
          startProgress();
        }
      }
    }
  });
  ytPlayerB = new YT.Player('yt-player-b', {
    height: '1', width: '1',
    playerVars: { autoplay: 0, controls: 0 },
    events: {
      onReady: function() { ytReadyB = true; },
      onStateChange: function(e) {
        if (activePlayer !== 'B') return;
        if (e.data === YT.PlayerState.ENDED) onSongEnd();
        if (e.data === YT.PlayerState.PLAYING) {
          if (!coroJumped) { coroJumped = true; ytPlayerB.seekTo(60, true); }
          startProgress();
        }
      }
    }
  });
};

function startProgress() {
  clearInterval(progressInterval);
  progressInterval = setInterval(function() {
    var pl = getActive();
    if (!pl || !pl.getDuration) return;
    try {
      var dur = pl.getDuration(), cur = pl.getCurrentTime();
      if (dur > 0) {
        document.getElementById('progress-fill').style.width = (cur / dur * 100) + '%';
        if (dur - cur < CROSSFADE_SECS && !crossfading && currentIndex < songs.length - 1) {
          crossfading = true;
          clearInterval(progressInterval);
          transitionToNext(currentIndex + 1);
        }
      }
    } catch(e) {}
  }, 500);
}

function onSongEnd() {
  clearInterval(progressInterval);
  document.getElementById('progress-fill').style.width = '0%';
  if (!crossfading) {
    if (currentIndex < songs.length - 1) transitionToNext(currentIndex + 1);
    else { document.getElementById('np-title').textContent = 'Sin mas canciones'; currentIndex = -1; renderQueue(); }
  }
}

function playIndex(i) {
  if (!songs[i]) return;
  coroJumped = false;
  crossfading = false;
  currentIndex = i;
  var song = songs[i];
  document.getElementById('np-title').textContent = song.title;
  activePlayer = 'A';
  if (ytReady && ytPlayer) {
    ytPlayer.setVolume(0);
    ytPlayer.loadVideoById({ videoId: song.videoId });
    var steps = 0;
    var fadeIn = setInterval(function() {
      steps++;
      var v = Math.min(100, Math.round(100 * steps / 10));
      try { ytPlayer.setVolume(v); } catch(e) {}
      if (steps >= 10) clearInterval(fadeIn);
    }, 150);
  }
  renderQueue();
  sbFetch('state?on_conflict=id', { method: 'POST', prefer: 'resolution=merge-duplicates', body: [{ id: 1, current_index: i, current_title: song.title, school_id: schoolId }] }).catch(function() {});
}

// ── Búsqueda via Cloudflare Worker ────────────────────────────────────────
var searchDebounce;
function triggerSearch() {
  clearTimeout(searchDebounce);
  var q = document.getElementById('search-input').value.trim();
  var res = document.getElementById('results');
  if (q.length < 2) { res.style.display = 'none'; res.innerHTML = ''; return; }
  res.style.display = 'block';
  res.innerHTML = '<div class="search-loading">Buscando...</div>';
  doSearch(q);
}
document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { clearTimeout(searchDebounce); triggerSearch(); }
});
document.getElementById('search-input').addEventListener('input', function() {
  var v = this.value.trim(), r = document.getElementById('results');
  clearTimeout(searchDebounce);
  if (v.length < 2) { r.style.display = 'none'; r.innerHTML = ''; return; }
  searchDebounce = setTimeout(function(){ triggerSearch(); }, 450);
});

function doSearch(q) {
  var res = document.getElementById('results');
  fetch('https://kara-search.brauzamorar.workers.dev?q=' + encodeURIComponent(q) + '&type=video')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!Array.isArray(data) || !data.length) { res.innerHTML = '<div class="search-loading">Sin resultados</div>'; return; }
      var html = '';
      data.slice(0,6).forEach(function(item) {
        var vid = item.videoId;
        var thumb = 'https://img.youtube.com/vi/' + vid + '/mqdefault.jpg';
        html += '<div class="result-item" data-vid="' + vid + '" data-title="' + item.title.replace(/"/g,'&quot;') + '">';
        html += '<img src="' + thumb + '" style="width:40px;height:30px;object-fit:cover;border-radius:4px;flex-shrink:0;">';
        html += '<div style="flex:1;overflow:hidden"><div style="font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + item.title + '</div>';
        html += '<div style="font-size:.72rem;color:var(--muted)">' + (item.author||'') + '</div></div>';
        html += '<button class="add-btn">+ Agregar</button></div>';
      });
      res.innerHTML = html;
      res.onclick = function(e) {
        var row = e.target.closest('.result-item');
        if (!row) return;
        addSong(row.dataset.vid, row.dataset.title);
      };
    })
    .catch(function() { res.innerHTML = '<div class="search-loading">Error al buscar</div>'; });
}

function addSong(videoId, title) {
  document.getElementById('results').style.display = 'none';
  document.getElementById('search-input').value = '';
  sbFetch('songs', { method: 'POST', prefer: 'return=representation', body: [{ title: title, videoId: videoId, school_id: schoolId }] })
    .then(function(res) { if (Array.isArray(res) && res[0]) { showToast(); loadAll(); } }).catch(function() {});
}

function showToast() {
  var t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function sendMsg() {
  var inp = document.getElementById('msg-input'), text = inp.value.trim();
  if (!text) return; inp.value = '';
  sbFetch('messages', { method: 'POST', prefer: 'return=representation', body: [{ text: text, school_id: schoolId }] })
    .then(function() { loadAll(); }).catch(function() {});
}
document.getElementById('msg-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') sendMsg(); });

function renderQueue() {
  var el = document.getElementById('queue-list');
  if (!songs.length) { el.innerHTML = '<div class="queue-empty">Sin canciones en la cola</div>'; return; }
  var html = '';
  for (var i = 0; i < songs.length; i++) {
    var playing = (currentIndex >= 0 && i === currentIndex);
    html += '<div class="queue-item' + (playing ? ' playing' : '') + '">';
    html += '<div class="queue-num">';
    if (playing) html += '<span class="bar"></span><span class="bar"></span><span class="bar"></span>';
    else html += (i + 1);
    html += '</div><div class="queue-title">' + songs[i].title + '</div></div>';
  }
  el.innerHTML = html;
}

function renderMessages() {
  var el = document.getElementById('msg-list');
  if (!messages.length) { el.innerHTML = '<div class="msg-empty">Sé el primero en dejar un saludo</div>'; return; }
  var html = '';
  messages.slice().reverse().forEach(function(m) {
    var time = m.created_at ? new Date(m.created_at).toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' }) : '';
    html += '<div class="msg-item"><span>💬</span><div><div class="msg-text">' + m.text + '</div><div class="msg-time">' + time + '</div></div></div>';
  });
  el.innerHTML = html;
}

function initApp() {
  schoolId = getSchoolId();
  if (!schoolId) { showError(); return; }
  sbFetch('schools?id=eq.' + schoolId + '&select=*').then(function(data) {
    if (!Array.isArray(data) || !data[0]) { showError(); return; }
    school = data[0];
    applySchool();
    loadYouTubeAPI();
    loadAll();
    setInterval(loadAll, 4000);
  }).catch(showError);
}

function applySchool() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app-header').style.display = 'flex';
  document.getElementById('app-player').style.display = 'block';
  document.getElementById('app-content').style.display = 'block';
  var sub = document.getElementById('school-city-h');
  if (sub) sub.textContent = school.name + (school.city ? ' — ' + school.city : '');
  document.getElementById('app-footer').textContent = school.name.toUpperCase() + (school.city ? ' — ' + school.city.toUpperCase() : '');
  document.title = 'Radio — ' + school.name;
  if (school.color) {
    document.documentElement.style.setProperty('--neon-pink', school.color);
    document.documentElement.style.setProperty('--accent', school.color);
  }
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-screen').style.display = 'flex';
}

function loadAll() {
  Promise.all([
    sbFetch('songs?select=*&order=created_at&school_id=eq.' + schoolId).catch(function(){return [];}),
    sbFetch('state?select=*&school_id=eq.' + schoolId).catch(function(){return [];})
  ]).then(function(results) {
    var s = results[0], st = results[1];
    if (Array.isArray(s)) {
      songs = s;
      if (Array.isArray(st) && st[0] && st[0].current_index !== null) {
        var serverIdx = st[0].current_index;
        if (serverIdx !== currentIndex) {
          currentIndex = serverIdx;
          if (songs[currentIndex]) document.getElementById('np-title').textContent = songs[currentIndex].title;
          if (ytReady && ytPlayer && songs[currentIndex]) playIndex(currentIndex);
        }
      } else if (songs.length && currentIndex === -1 && ytReady) {
        playIndex(0);
      }
      renderQueue();
    }
  });
  sbFetch('messages?select=*&order=created_at&school_id=eq.' + schoolId).then(function(m) {
    if (Array.isArray(m)) { messages = m; renderMessages(); }
  }).catch(function() {});
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap') && !e.target.closest('#results')) document.getElementById('results').style.display = 'none';
});

initApp();
</script>
