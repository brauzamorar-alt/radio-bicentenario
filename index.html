<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Radio Escolar</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--accent:#e63946;--navy:#0a1628;--navy2:#0f2040;--panel:#111d33;--panel2:#162238;--gold:#f4b942;--green:#22c55e;--text:#e8edf5;--muted:#7a8fa6;--border:#1e3050;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow-x:hidden;}
body{background:var(--navy);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
#loading{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px;}
#loading h2{font-family:'Oswald',sans-serif;font-size:1.5rem;color:var(--text);}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
header{background:var(--navy2);border-bottom:2px solid var(--accent);padding:12px 16px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;}
.header-text h1{font-family:'Oswald',sans-serif;font-size:1.35rem;font-weight:700;color:#fff;line-height:1;}
.header-text span{font-size:.72rem;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.live-badge{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(230,57,70,.15);border:1px solid var(--accent);border-radius:20px;padding:5px 12px;font-size:.75rem;font-weight:500;color:var(--accent);letter-spacing:1px;}
.live-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.player-section{background:var(--panel);border-bottom:1px solid var(--border);padding:14px 16px;}
.now-playing-label{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.now-playing-title{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:500;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:1.5rem;}
.progress-bar{height:4px;background:var(--border);border-radius:4px;margin-top:10px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:4px;width:0%;transition:width .5s linear;}
.section{padding:14px 16px;}
.section-title{font-family:'Oswald',sans-serif;font-size:.85rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.search-wrap{position:relative;}
.search-wrap input{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:11px 80px 11px 40px;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
.search-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--accent);border:none;border-radius:7px;color:#fff;font-size:.78rem;font-weight:600;padding:6px 12px;cursor:pointer;}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);}
#results{background:var(--panel2);border:1px solid var(--border);border-radius:10px;margin-top:6px;overflow:hidden;display:none;}
.result-item{padding:11px 14px;cursor:pointer;font-size:.88rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;transition:background .15s;}
.result-item:last-child{border-bottom:none;}
.result-item:hover{background:rgba(230,57,70,.1);}
.add-btn{margin-left:auto;background:var(--accent);border:none;border-radius:6px;color:#fff;font-size:.75rem;padding:4px 10px;cursor:pointer;font-weight:500;white-space:nowrap;}
.search-loading{padding:12px 14px;color:var(--muted);font-size:.85rem;}
.added-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:500;transition:transform .3s ease;z-index:999;pointer-events:none;}
.added-toast.show{transform:translateX(-50%) translateY(0);}
#queue-list{display:flex;flex-direction:column;gap:6px;}
.queue-item{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:.88rem;}
.queue-item.playing{border-color:var(--accent);background:rgba(230,57,70,.08);}
.queue-num{font-family:'Oswald',sans-serif;font-size:.8rem;color:var(--muted);min-width:20px;}
.queue-item.playing .queue-num{color:var(--accent);}
.bar{width:3px;background:var(--accent);border-radius:2px;animation:bars .7s infinite alternate;display:inline-block;margin:0 1px;}
.bar:nth-child(2){animation-delay:.15s;}.bar:nth-child(3){animation-delay:.3s;}
@keyframes bars{from{height:4px}to{height:14px}}
.queue-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.queue-empty{text-align:center;color:var(--muted);font-size:.85rem;padding:20px;}
.msg-input-wrap{display:flex;gap:8px;margin-bottom:10px;}
.msg-input-wrap input{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:.88rem;outline:none;}
.msg-input-wrap input::placeholder{color:var(--muted);}
.send-btn{background:var(--gold);border:none;border-radius:10px;padding:10px 16px;color:var(--navy);font-weight:700;font-size:.85rem;cursor:pointer;white-space:nowrap;}
#msg-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;}
.msg-item{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:9px 14px;font-size:.88rem;display:flex;gap:8px;align-items:flex-start;}
.msg-text{flex:1;line-height:1.4;}
.msg-time{font-size:.72rem;color:var(--muted);margin-top:2px;}
.msg-empty{color:var(--muted);font-size:.85rem;text-align:center;padding:16px;}
footer{margin-top:auto;text-align:center;padding:10px;font-size:.7rem;color:var(--border);letter-spacing:1px;}
#yt-player-a,#yt-player-b{position:absolute;top:-9999px;left:-9999px;width:1px;height:1px;}
#error-screen{display:none;position:fixed;inset:0;background:var(--navy);align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:20px;}
#error-screen h2{font-family:'Oswald',sans-serif;color:var(--accent);}
#error-screen p{color:var(--muted);}
#locutor-banner{display:none;position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:var(--navy2);border:1px solid var(--gold);border-radius:20px;padding:8px 18px;font-size:.8rem;color:var(--gold);z-index:998;pointer-events:none;white-space:nowrap;}
#locutor-banner.show{display:block;}
#conn-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:4px;flex-shrink:0;}
#conn-dot.ok{background:var(--green);}
#conn-dot.err{background:var(--accent);}
</style>
</head>
<body>
<div id="yt-player-a"></div>
<div id="yt-player-b"></div>
<div id="loading"><div class="spinner"></div><h2>Cargando radio...</h2></div>
<div id="error-screen"><h2>Colegio no encontrado</h2><p>Verifica la URL e intenta nuevamente.</p></div>
<div id="locutor-banner">🎙️ <span id="locutor-text"></span></div>

<header style="display:none" id="app-header">
  <div class="header-text">
    <h1 id="school-name-h">Radio Escolar</h1>
    <span id="school-city-h">-</span>
  </div>
  <div class="live-badge"><div id="conn-dot"></div><div class="live-dot"></div>EN VIVO</div>
</header>
<div class="player-section" style="display:none" id="app-player">
  <div class="now-playing-label">Reproduciendo ahora</div>
  <div class="now-playing-title" id="np-title">Esperando canciones...</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>
<div id="app-content" style="display:none">
  <div class="section">
    <div class="section-title">Pedir cancion</div>
    <div class="search-wrap">
      <span class="search-icon">&#127925;</span>
      <input type="text" id="search-input" placeholder="Busca un tema, artista..." autocomplete="off">
      <button class="search-btn" onclick="triggerSearch()">Buscar</button>
    </div>
    <div id="results"></div>
  </div>
  <div class="section">
    <div class="section-title">Lista de reproduccion</div>
    <div id="queue-list"><div class="queue-empty">Sin canciones aun...</div></div>
  </div>
  <div class="section">
    <div class="section-title">Saludos y mensajes</div>
    <div class="msg-input-wrap">
      <input type="text" id="msg-input" placeholder="Feliz cumple, saludos..." maxlength="120">
      <button class="send-btn" onclick="sendMsg()">Enviar</button>
    </div>
    <div id="msg-list"><div class="msg-empty">Sin mensajes aun...</div></div>
  </div>
  <footer id="app-footer">RADIO ESCOLAR</footer>
</div>
<div class="added-toast" id="toast">Cancion agregada</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SB_URL='https://dyyftbaniffvyeqmnayh.supabase.co';
var SB_KEY='sb_publishable_zeq17EOddIPy9r_8KdeLNg_ZDyTGOmU';
var sb=supabase.createClient(SB_URL,SB_KEY);
var schoolId='',school=null;
var songs=[],messages=[],currentIndex=-1;

// ── Dos players para mezcla DJ ────────────────────────────────────────────
var players={A:null,B:null};
var ready={A:false,B:false};
var active='A', nextSlot='B';
var DJ_MIX_SECS=5, MIX_STEPS=50;
var progressInterval=null, mixing=false;
var coroFlags={A:false,B:false};

// Opciones
var optCrossfade=true,optJingle=true,optLocutor=true,optJingleEnMezcla=true;
var customJingleUrl=null,customLocutorUrl=null;
var pendingState=null; // estado guardado si llega antes de que YouTube esté listo

function sbFetch(path,opts){
  var h={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
  if(opts&&opts.prefer)h['Prefer']=opts.prefer;
  return fetch(SB_URL+'/rest/v1/'+path,{method:opts&&opts.method?opts.method:'GET',headers:h,body:opts&&opts.body?JSON.stringify(opts.body):undefined}).then(function(r){return r.json();});
}

// ── Jingle ────────────────────────────────────────────────────────────────
function playJingle(onEnd){
  if(!optJingle){if(onEnd)onEnd();return;}
  if(customJingleUrl){
    try{var a=new Audio(customJingleUrl);a.volume=0.85;a.play().catch(function(){if(onEnd)onEnd();});a.onended=function(){if(onEnd)onEnd();};a.onerror=function(){if(onEnd)onEnd();};return;}catch(e){}
  }
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var dur=2.5,rate=ctx.sampleRate,buf=ctx.createBuffer(1,rate*dur,rate),d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++){var t=i/rate;d[i]=Math.sin(2*Math.PI*(440+880*(t/dur))*t)*Math.exp(-t*1.2)*0.18;}
    var src=ctx.createBufferSource();src.buffer=buf;src.connect(ctx.destination);src.start(0);
    src.onended=function(){ctx.close();if(onEnd)onEnd();};
  }catch(e){if(onEnd)onEnd();}
}

// ── Locutor ───────────────────────────────────────────────────────────────
function speakTitle(title,onEnd){
  if(!optLocutor){if(onEnd)onEnd();return;}
  var clean=title.replace(/\(.*?\)/g,'').replace(/\[.*?\]/g,'').replace(/official|video|lyrics|hd|4k|mv|ft\.|feat\./gi,'').replace(/\s+/g,' ').trim().substring(0,60);
  var banner=document.getElementById('locutor-banner');
  document.getElementById('locutor-text').textContent='🎵 '+clean;
  banner.classList.add('show');setTimeout(function(){banner.classList.remove('show');},4000);
  if(customLocutorUrl){
    try{var a=new Audio(customLocutorUrl);a.volume=0.9;a.play().catch(function(){if(onEnd)onEnd();});a.onended=function(){if(onEnd)onEnd();};a.onerror=function(){if(onEnd)onEnd();};return;}catch(e){}
  }
  if(!window.speechSynthesis){if(onEnd)onEnd();return;}
  var u=new SpeechSynthesisUtterance('Ahora suena: '+clean);
  u.lang='es-CL';u.rate=0.95;u.pitch=1.05;u.volume=0.9;
  u.onend=u.onerror=function(){if(onEnd)onEnd();};
  window.speechSynthesis.cancel();window.speechSynthesis.speak(u);
}

// ── Seek al coro ──────────────────────────────────────────────────────────
function seekToCoro(key){
  if(coroFlags[key])return;
  coroFlags[key]=true;
  var pl=players[key],att=0;
  var iv=setInterval(function(){
    att++;
    try{var dur=pl.getDuration();if(dur>60){clearInterval(iv);pl.seekTo(Math.min(Math.max(Math.floor(dur*0.20),45),90),true);}}catch(e){}
    if(att>20)clearInterval(iv);
  },200);
}

// ── Fade logarítmico ──────────────────────────────────────────────────────
function fadeVol(key,dir,steps,ms,cb){
  var pl=players[key],step=0;
  var iv=setInterval(function(){
    step++;
    var pct=step/steps;
    var vol=dir==='up'?Math.round(100*Math.pow(pct,0.5)):Math.round(100*Math.pow(1-pct,2));
    try{pl.setVolume(Math.min(100,Math.max(0,vol)));}catch(e){}
    if(step>=steps){clearInterval(iv);if(cb)cb();}
  },ms);
  return iv;
}

// ── MEZCLA DJ ─────────────────────────────────────────────────────────────
function djMix(nextIdx){
  if(!songs[nextIdx]||mixing)return;
  mixing=true;
  clearInterval(progressInterval);
  var slot=nextSlot;
  var pl=players[slot];
  coroFlags[slot]=false;

  pl.setVolume(0);
  pl.loadVideoById({videoId:songs[nextIdx].videoId});

  // Jingle y locutor en paralelo si está activo
  if(optJingleEnMezcla){
    playJingle(function(){if(songs[nextIdx])speakTitle(songs[nextIdx].title,null);});
  }

  var waited=0;
  var waitIv=setInterval(function(){
    waited++;
    try{
      var state=pl.getPlayerState();
      if(state===1||state===3){
        clearInterval(waitIv);
        seekToCoro(slot);
        currentIndex=nextIdx;
        document.getElementById('np-title').textContent=songs[nextIdx].title;
        renderQueue();
        var ms=Math.round(DJ_MIX_SECS*1000/MIX_STEPS);
        var step=0;
        var mixIv=setInterval(function(){
          step++;
          var pct=step/MIX_STEPS;
          try{players[active].setVolume(Math.max(0,Math.round(100*Math.pow(1-pct,2))));}catch(e){}
          try{players[slot].setVolume(Math.min(100,Math.round(100*Math.pow(pct,0.5))));}catch(e){}
          if(step>=MIX_STEPS){
            clearInterval(mixIv);
            try{players[active].stopVideo();players[active].setVolume(100);}catch(e){}
            active=slot;nextSlot=active==='A'?'B':'A';
            mixing=false;startProgress();
          }
        },ms);
      }
    }catch(e){}
    if(waited>40){clearInterval(waitIv);mixing=false;playVideoAt(nextIdx);}
  },150);
}

// ── Transición ────────────────────────────────────────────────────────────
function transitionTo(nextIdx){
  if(!songs[nextIdx]||mixing)return;
  if(optCrossfade){
    djMix(nextIdx);
  } else {
    try{players[active].stopVideo();}catch(e){}
    clearInterval(progressInterval);
    playJingle(function(){speakTitle(songs[nextIdx]?songs[nextIdx].title:'',function(){playVideoAt(nextIdx);});});
  }
}

// ── Reproducir desde cero ─────────────────────────────────────────────────
function playVideoAt(i){
  if(!songs[i])return;
  try{players.A.stopVideo();players.A.setVolume(100);}catch(e){}
  try{players.B.stopVideo();players.B.setVolume(100);}catch(e){}
  mixing=false;coroFlags.A=false;coroFlags.B=false;
  active='A';nextSlot='B';
  currentIndex=i;
  document.getElementById('np-title').textContent=songs[i].title;
  clearInterval(progressInterval);
  document.getElementById('progress-fill').style.width='0%';
  if(ready.A){players.A.setVolume(0);players.A.loadVideoById({videoId:songs[i].videoId});fadeVol('A','up',20,100,null);}
  renderQueue();
}

function pauseVideo(){try{players[active].pauseVideo();}catch(e){}}
function resumeVideo(){try{players[active].playVideo();}catch(e){}}
function setVolume(v){try{players[active].setVolume(parseInt(v));}catch(e){}}

// ── Comandos desde Supabase ───────────────────────────────────────────────
var lastCmd='';
function applyState(st){
  if(!st)return;
  // Si los players aún no están listos, guardar para ejecutar después
  if(!ready.A||!ready.B){pendingState=st;return;}
  var cmd=st.command||'',idx=st.current_index!==null?st.current_index:-1,vol=st.volume!==undefined?st.volume:100,cmdId=st.command_id||'';
  if(st.opt_crossfade!==undefined)optCrossfade=!!st.opt_crossfade;
  if(st.opt_jingle!==undefined)optJingle=!!st.opt_jingle;
  if(st.opt_locutor!==undefined)optLocutor=!!st.opt_locutor;
  if(st.opt_jingle_en_mezcla!==undefined)optJingleEnMezcla=!!st.opt_jingle_en_mezcla;
  if(st.custom_jingle_url!==undefined)customJingleUrl=st.custom_jingle_url||null;
  if(st.custom_locutor_url!==undefined)customLocutorUrl=st.custom_locutor_url||null;
  if(cmdId&&cmdId===lastCmd)return;
  lastCmd=cmdId;
  if(cmd==='play'){
    if(idx>=0&&idx<songs.length){if(idx!==currentIndex){if(currentIndex>=0)transitionTo(idx);else playVideoAt(idx);}else resumeVideo();}
    else if(songs.length>0&&currentIndex===-1)playVideoAt(0);
  } else if(cmd==='pause'){pauseVideo();}
  else if(cmd==='next'){var n=(currentIndex>=0?currentIndex:-1)+1;if(n<songs.length)transitionTo(n);else{try{players[active].stopVideo();}catch(e){}currentIndex=-1;renderQueue();document.getElementById('np-title').textContent='Sin mas canciones';}}
  else if(cmd==='volume'){setVolume(vol);}
  else if(cmd==='stop'){
    mixing=true;fadeVol(active,'down',15,100,function(){try{players.A.stopVideo();players.B.stopVideo();}catch(e){}mixing=false;});
    clearInterval(progressInterval);currentIndex=-1;renderQueue();document.getElementById('np-title').textContent='Esperando canciones...';
  }
}

// ── YouTube API ───────────────────────────────────────────────────────────
function loadYouTubeAPI(){var s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);}

function makePlayer(divId,key){
  return new YT.Player(divId,{height:'1',width:'1',playerVars:{autoplay:0,controls:0},events:{
    onReady:function(){ready[key]=true;},
    onError:function(){
      if(key!==active)return;
      clearInterval(progressInterval);
      var n=currentIndex+1;
      if(n<songs.length){mixing=false;playVideoAt(n);}
      else{document.getElementById('np-title').textContent='Sin mas canciones';currentIndex=-1;renderQueue();}
    },
    onStateChange:function(e){
      if(key!==active){if(e.data===YT.PlayerState.PLAYING)seekToCoro(key);return;}
      if(e.data===YT.PlayerState.PLAYING){seekToCoro(key);startProgress();}
      if(e.data===YT.PlayerState.PAUSED)clearInterval(progressInterval);
      if(e.data===YT.PlayerState.ENDED){
        clearInterval(progressInterval);
        if(!mixing&&currentIndex<songs.length-1)transitionTo(currentIndex+1);
        else if(!mixing){document.getElementById('np-title').textContent='Sin mas canciones';currentIndex=-1;renderQueue();}
      }
    }
  }});
}

window.onYouTubeIframeAPIReady=function(){
  players.A=makePlayer('yt-player-a','A');
  players.B=makePlayer('yt-player-b','B');
  // Esperar a que ambos players estén listos, luego aplicar estado guardado
  var waitPlayers=setInterval(function(){
    if(ready.A&&ready.B){
      clearInterval(waitPlayers);
      if(pendingState){
        var st=pendingState; pendingState=null;
        // Forzar re-ejecución ignorando lastCmd
        lastCmd='';
        applyState(st);
      }
    }
  },200);
};

function startProgress(){
  clearInterval(progressInterval);
  progressInterval=setInterval(function(){
    var pl=players[active];if(!pl||!pl.getDuration)return;
    try{
      var dur=pl.getDuration(),cur=pl.getCurrentTime();
      if(dur>0){
        document.getElementById('progress-fill').style.width=(cur/dur*100)+'%';
        if(dur-cur<DJ_MIX_SECS+1&&!mixing&&currentIndex<songs.length-1)transitionTo(currentIndex+1);
      }
    }catch(e){}
  },500);
}

// ── Realtime ──────────────────────────────────────────────────────────────
function connectRealtime(){
  var dot=document.getElementById('conn-dot');
  sb.channel('state-ch').on('postgres_changes',{event:'*',schema:'public',table:'state',filter:'school_id=eq.'+schoolId},function(p){dot.className='ok';applyState(p.new);}).subscribe(function(s){if(s==='SUBSCRIBED')dot.className='ok';if(s==='CLOSED'||s==='CHANNEL_ERROR')dot.className='err';});
  sb.channel('songs-ch').on('postgres_changes',{event:'*',schema:'public',table:'songs',filter:'school_id=eq.'+schoolId},function(){loadSongs();}).subscribe();
  sb.channel('msgs-ch').on('postgres_changes',{event:'*',schema:'public',table:'messages',filter:'school_id=eq.'+schoolId},function(){loadMessages();}).subscribe();
}

function loadSongs(){sbFetch('songs?select=*&order=created_at&school_id=eq.'+schoolId).then(function(s){if(Array.isArray(s)){songs=s;renderQueue();}}).catch(function(){});}
function loadMessages(){sbFetch('messages?select=*&order=created_at&school_id=eq.'+schoolId).then(function(m){if(Array.isArray(m)){messages=m;renderMessages();}}).catch(function(){});}

function getSchoolId(){return new URLSearchParams(window.location.search).get('school')||'';}

function initApp(){
  schoolId=getSchoolId();
  if(!schoolId){showError();return;}
  sbFetch('schools?id=eq.'+schoolId+'&select=*').then(function(data){
    if(!Array.isArray(data)||!data[0]){showError();return;}
    school=data[0];applySchool();loadYouTubeAPI();
    // Cargar canciones, mensajes Y estado actual en paralelo
    Promise.all([
      sbFetch('songs?select=*&order=created_at&school_id=eq.'+schoolId),
      sbFetch('messages?select=*&order=created_at&school_id=eq.'+schoolId),
      sbFetch('state?select=*&school_id=eq.'+schoolId)
    ]).then(function(results){
      if(Array.isArray(results[0])){ songs=results[0]; renderQueue(); }
      if(Array.isArray(results[1])){ messages=results[1]; renderMessages(); }
      // Guardar estado como pendiente — se ejecutará cuando YouTube esté listo
      if(Array.isArray(results[2])&&results[2][0]){
        pendingState=results[2][0];
      }
    }).catch(function(){});
    connectRealtime();
    setInterval(function(){loadSongs();loadMessages();},2000);
  }).catch(showError);
}

function applySchool(){
  document.getElementById('loading').style.display='none';
  document.getElementById('app-header').style.display='flex';
  document.getElementById('app-player').style.display='block';
  document.getElementById('app-content').style.display='block';
  document.getElementById('school-name-h').textContent=school.name;
  document.getElementById('school-city-h').textContent=school.city||'';
  document.getElementById('app-footer').textContent=school.name.toUpperCase()+(school.city?' - '+school.city.toUpperCase():'');
  document.title='Radio - '+school.name;
  if(school.color)document.documentElement.style.setProperty('--accent',school.color);
}
function showError(){document.getElementById('loading').style.display='none';document.getElementById('error-screen').style.display='flex';}

function triggerSearch(){
  var q=document.getElementById('search-input').value.trim(),res=document.getElementById('results');
  if(q.length<2){res.style.display='none';res.innerHTML='';return;}
  res.style.display='block';res.innerHTML='<div class="search-loading">Buscando...</div>';doSearch(q);
}
document.getElementById('search-input').addEventListener('keydown',function(e){if(e.key==='Enter')triggerSearch();});
document.getElementById('search-input').addEventListener('input',function(){if(this.value.trim().length<2){var r=document.getElementById('results');r.style.display='none';r.innerHTML='';}});

function doSearch(q){
  var res=document.getElementById('results');
  var instances=['https://inv.nadeko.net','https://invidious.privacyredirect.com','https://yt.drgnz.club'];
  var trySearch=function(idx){
    if(idx>=instances.length){res.innerHTML='<div class="search-loading">Error al buscar</div>';return;}
    fetch(instances[idx]+'/api/v1/search?q='+encodeURIComponent(q)+'&type=video&fields=videoId,title,author,videoThumbnails')
      .then(function(r){if(!r.ok)throw 0;return r.json();})
      .then(function(data){
        if(!Array.isArray(data)||!data.length){res.innerHTML='<div class="search-loading">Sin resultados</div>';return;}
        var html='';
        data.slice(0,6).forEach(function(item){
          var fallback='https://img.youtube.com/vi/'+item.videoId+'/mqdefault.jpg';
          var thumb=item.videoThumbnails&&item.videoThumbnails[4]?item.videoThumbnails[4].url:fallback;
          html+='<div class="result-item" data-vid="'+item.videoId+'" data-title="'+item.title.replace(/"/g,'&quot;')+'">';
          html+='<img src="'+thumb+'" data-fb="'+fallback+'" style="width:40px;height:30px;object-fit:cover;border-radius:4px;flex-shrink:0;" onerror="this.src=this.dataset.fb">';
          html+='<div style="flex:1;overflow:hidden"><div style="font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+item.title+'</div>';
          html+='<div style="font-size:.72rem;color:var(--muted)">'+(item.author||'')+'</div></div>';
          html+='<button class="add-btn">+ Agregar</button></div>';
        });
        res.innerHTML=html;
        res.onclick=function(e){
          var item=e.target.closest('.result-item');
          if(!item)return;
          addSong(item.dataset.vid,item.dataset.title);
        };
      })
      .catch(function(){trySearch(idx+1);});
  };
  trySearch(0);
}
function addSong(videoId,title){
  document.getElementById('results').style.display='none';document.getElementById('search-input').value='';
  sbFetch('songs',{method:'POST',prefer:'return=representation',body:[{title:title,videoId:videoId,school_id:schoolId}]}).then(function(res){if(Array.isArray(res)&&res[0])showToast();}).catch(function(){});
}
function showToast(){var t=document.getElementById('toast');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

function sendMsg(){var inp=document.getElementById('msg-input'),text=inp.value.trim();if(!text)return;inp.value='';sbFetch('messages',{method:'POST',prefer:'return=representation',body:[{text:text,school_id:schoolId}]}).catch(function(){});}
document.getElementById('msg-input').addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});

function renderQueue(){
  var el=document.getElementById('queue-list');
  if(!songs.length){el.innerHTML='<div class="queue-empty">Sin canciones aun...</div>';return;}
  var html='';
  songs.forEach(function(s,i){
    var playing=(currentIndex>=0&&i===currentIndex);
    html+='<div class="queue-item'+(playing?' playing':'')+'"><div class="queue-num">';
    if(playing)html+='<span class="bar"></span><span class="bar"></span><span class="bar"></span>';
    else html+=(i+1);
    html+='</div><div class="queue-title">'+s.title+'</div></div>';
  });
  el.innerHTML=html;
}
function renderMessages(){
  var el=document.getElementById('msg-list');
  if(!messages.length){el.innerHTML='<div class="msg-empty">Se el primero en dejar un saludo</div>';return;}
  var html='';messages.slice().reverse().forEach(function(m){
    var time=m.created_at?new Date(m.created_at).toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}):'';
    html+='<div class="msg-item"><span>&#128172;</span><div><div class="msg-text">'+m.text+'</div><div class="msg-time">'+time+'</div></div></div>';
  });
  el.innerHTML=html;
}
document.addEventListener('click',function(e){if(!e.target.closest('.search-wrap')&&!e.target.closest('#results'))document.getElementById('results').style.display='none';});
initApp();
</script>
</body>
</html>
